# CI: PR в main
# Полный прогон всех jobs без фильтров по paths.
# Падение любого job блокирует merge.
#
# Branch protection rules (настроить в Settings → Branches → main):
#   - Require status checks to pass before merging
#   - Добавить все jobs: lint-backend, lint-web,
#     lint-markdown, lint-python, test-backend, test-web,
#     build-cookbook, build-apigateway, build-web, e2e
#   - Require branches to be up to date before merging

name: CI PR

on:
  pull_request:
    branches:
      - main

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  # ─── Lint ─────────────────────────────────────────────────────────────────
  lint-backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4.2.2
      - uses: actions/setup-dotnet@v4.3.1
        with:
          dotnet-version: '10.0.x'
      - name: Lint C# (Backend)
        run: dotnet format --verify-no-changes apps/Backend.slnx

  lint-web:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4.2.2
      - uses: pnpm/action-setup@v4.1.0
        with:
          run_install: false
          package_json_file: apps/web/package.json
      - uses: actions/setup-node@v4.4.0
        with:
          node-version: lts/*
          cache: pnpm
          cache-dependency-path: apps/web/pnpm-lock.yaml
      - name: Install dependencies
        working-directory: apps/web
        run: pnpm install --frozen-lockfile
      - name: Lint (Next.js)
        working-directory: apps/web
        run: pnpm lint

  lint-markdown:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4.2.2
      - name: Lint Markdown
        run: npx markdownlint-cli2 "**/*.md" --ignore node_modules

  lint-python:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4.2.2
      - uses: actions/setup-python@v5.6.0
        with:
          python-version: '3.12'
      - name: Install ruff
        run: pip install ruff
      - name: Lint Python
        run: ruff check tests/e2e/ tests/ui/

  # ─── Test ─────────────────────────────────────────────────────────────────
  test-backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4.2.2
      - uses: actions/setup-dotnet@v4.3.1
        with:
          dotnet-version: '10.0.x'
      - name: Test (Backend)
        run: >
          dotnet test apps/Backend.slnx
          --collect:"XPlat Code Coverage"
          /p:Threshold=80
          /p:ThresholdType=line
          /p:ThresholdStat=total

  test-web:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4.2.2
      - uses: pnpm/action-setup@v4.1.0
        with:
          run_install: false
          package_json_file: apps/web/package.json
      - uses: actions/setup-node@v4.4.0
        with:
          node-version: lts/*
          cache: pnpm
          cache-dependency-path: apps/web/pnpm-lock.yaml
      - name: Install dependencies
        working-directory: apps/web
        run: pnpm install --frozen-lockfile
      - name: Test (Next.js)
        working-directory: apps/web
        run: pnpm test:coverage

  # ─── Build ────────────────────────────────────────────────────────────────
  build-cookbook:
    needs: [lint-backend, test-backend]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4.2.2
      - uses: docker/setup-buildx-action@v3.10.0
      - uses: docker/build-push-action@v6.16.0
        with:
          context: apps/
          file: apps/Cookbook/Dockerfile
          push: false
          cache-from: type=gha
          cache-to: type=gha,mode=max

  build-apigateway:
    needs: [lint-backend, test-backend]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4.2.2
      - uses: docker/setup-buildx-action@v3.10.0
      - uses: docker/build-push-action@v6.16.0
        with:
          context: .
          file: apps/ApiGateway/Dockerfile
          push: false
          cache-from: type=gha
          cache-to: type=gha,mode=max

  build-web:
    needs: [lint-web, test-web]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4.2.2
      - uses: docker/setup-buildx-action@v3.10.0
      - uses: docker/build-push-action@v6.16.0
        with:
          context: apps/web
          push: false
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ─── E2e ──────────────────────────────────────────────────────────────────
  e2e:
    needs: [build-cookbook, build-apigateway, build-web]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4.2.2
      - uses: actions/setup-python@v5.6.0
        with:
          python-version: '3.12'
      - name: Start services
        run: |
          for i in 1 2 3; do
            docker compose up -d --wait && break || sleep 15
          done
      - name: Install e2e dependencies
        run: pip install -r tests/e2e/requirements.txt
      - name: Run e2e tests
        env:
          BASE_URL: http://localhost:5500
        run: pytest tests/e2e/
      - name: Show logs on failure
        if: failure()
        run: docker compose logs --no-color
      - name: Stop services
        if: always()
        run: docker compose down

  # ─── UI-тесты ─────────────────────────────────────────────────────────────
  ui-test:
    needs: [build-cookbook, build-apigateway, build-web]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4.2.2
      - uses: actions/setup-python@v5.6.0
        with:
          python-version: '3.12'
      - name: Start services
        run: |
          for i in 1 2 3; do
            docker compose up -d --wait && break || sleep 15
          done
      - name: Install UI test dependencies
        run: pip install -r tests/ui/requirements.txt
      - name: Install Playwright browsers
        run: playwright install --with-deps chromium
      - name: Run UI tests
        env:
          BASE_URL: http://localhost:5500
        run: pytest tests/ui/
      - name: Show logs on failure
        if: failure()
        run: docker compose logs --no-color
      - name: Stop services
        if: always()
        run: docker compose down
