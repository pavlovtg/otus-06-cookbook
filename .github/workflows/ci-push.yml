# CI: push в feature-ветки
# Запускает только jobs для затронутых компонентов (paths-фильтры).
# Для PR в main используется ci-pr.yml (полный прогон без фильтров).

name: CI Push

on:
  push:
    branches-ignore:
      - main

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  # ─── Определение затронутых компонентов ───────────────────────────────────
  changes:
    runs-on: ubuntu-latest
    outputs:
      backend: ${{ steps.filter.outputs.backend }}
      web: ${{ steps.filter.outputs.web }}
      markdown: ${{ steps.filter.outputs.markdown }}
      python: ${{ steps.filter.outputs.python }}
      e2e: ${{ steps.filter.outputs.e2e }}
      ui: ${{ steps.filter.outputs.ui }}
    steps:
      - uses: actions/checkout@v4.2.2
      - uses: dorny/paths-filter@v3.0.2
        id: filter
        with:
          filters: |
            backend:
              - 'apps/ApiGateway/**'
              - 'apps/Cookbook/**'
              - 'apps/Shared/**'
            web:
              - 'apps/web/**'
            markdown:
              - '**/*.md'
            python:
              - 'tests/e2e/**'
              - 'tests/ui/**'
            e2e:
              - 'apps/**'
              - 'docker-compose.yml'
              - 'infrastructure/**'
              - 'tests/e2e/**'
            ui:
              - 'apps/**'
              - 'docker-compose.yml'
              - 'infrastructure/**'
              - 'tests/ui/**'

  # ─── Lint ─────────────────────────────────────────────────────────────────
  lint-backend:
    needs: changes
    if: needs.changes.outputs.backend == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4.2.2
      - uses: actions/setup-dotnet@v4.3.1
        with:
          dotnet-version: '10.0.x'
      - name: Lint C# (Backend)
        run: dotnet format --verify-no-changes apps/Backend.slnx

  lint-web:
    needs: changes
    if: needs.changes.outputs.web == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4.2.2
      - uses: pnpm/action-setup@v4.1.0
        with:
          run_install: false
          package_json_file: apps/web/package.json
      - uses: actions/setup-node@v4.4.0
        with:
          node-version: lts/*
          cache: pnpm
          cache-dependency-path: apps/web/pnpm-lock.yaml
      - name: Install dependencies
        working-directory: apps/web
        run: pnpm install --frozen-lockfile
      - name: Lint (Next.js)
        working-directory: apps/web
        run: pnpm lint

  lint-markdown:
    needs: changes
    if: needs.changes.outputs.markdown == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4.2.2
      - name: Lint Markdown
        run: npx markdownlint-cli2 "**/*.md" --ignore node_modules

  lint-python:
    needs: changes
    if: needs.changes.outputs.python == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4.2.2
      - uses: actions/setup-python@v5.6.0
        with:
          python-version: '3.12'
      - name: Install ruff
        run: pip install ruff
      - name: Lint Python
        run: ruff check tests/e2e/ tests/ui/

  # ─── Test ─────────────────────────────────────────────────────────────────
  test-backend:
    needs: changes
    if: needs.changes.outputs.backend == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4.2.2
      - uses: actions/setup-dotnet@v4.3.1
        with:
          dotnet-version: '10.0.x'
      - name: Test (Backend)
        run: >
          dotnet test apps/Backend.slnx
          --collect:"XPlat Code Coverage"
          /p:Threshold=80
          /p:ThresholdType=line
          /p:ThresholdStat=total

  test-web:
    needs: changes
    if: needs.changes.outputs.web == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4.2.2
      - uses: pnpm/action-setup@v4.1.0
        with:
          run_install: false
          package_json_file: apps/web/package.json
      - uses: actions/setup-node@v4.4.0
        with:
          node-version: lts/*
          cache: pnpm
          cache-dependency-path: apps/web/pnpm-lock.yaml
      - name: Install dependencies
        working-directory: apps/web
        run: pnpm install --frozen-lockfile
      - name: Test (Next.js)
        working-directory: apps/web
        run: pnpm test:coverage

  # ─── Build ────────────────────────────────────────────────────────────────
  build-cookbook:
    needs: [lint-backend, test-backend]
    if: |
      always() &&
      needs.lint-backend.result == 'success' &&
      needs.test-backend.result == 'success'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4.2.2
      - uses: docker/setup-buildx-action@v3.10.0
      - uses: docker/build-push-action@v6.16.0
        with:
          context: apps/
          file: apps/Cookbook/Dockerfile
          push: false
          cache-from: type=gha
          cache-to: type=gha,mode=max

  build-apigateway:
    needs: [lint-backend, test-backend]
    if: |
      always() &&
      needs.lint-backend.result == 'success' &&
      needs.test-backend.result == 'success'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4.2.2
      - uses: docker/setup-buildx-action@v3.10.0
      - uses: docker/build-push-action@v6.16.0
        with:
          context: apps/
          file: apps/ApiGateway/Dockerfile
          push: false
          cache-from: type=gha
          cache-to: type=gha,mode=max

  build-web:
    needs: [lint-web, test-web]
    if: |
      always() &&
      needs.lint-web.result == 'success' &&
      needs.test-web.result == 'success'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4.2.2
      - uses: docker/setup-buildx-action@v3.10.0
      - uses: docker/build-push-action@v6.16.0
        with:
          context: apps/web
          push: false
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ─── E2e ──────────────────────────────────────────────────────────────────
  # Запускается если изменились инфраструктура (e2e filter) или любой из компонентов.
  # build-* jobs могут быть skipped (компонент не менялся) — это допустимо;
  # e2e блокируется только при явном failure одного из build-* jobs.
  e2e:
    needs: [changes, build-cookbook, build-apigateway, build-web]
    if: |
      always() &&
      needs.changes.outputs.e2e == 'true' ||
      needs.changes.outputs.backend == 'true' ||
      needs.changes.outputs.web == 'true' &&
      contains(fromJSON('["success", "skipped"]'), needs.build-cookbook.result) &&
      contains(fromJSON('["success", "skipped"]'), needs.build-apigateway.result) &&
      contains(fromJSON('["success", "skipped"]'), needs.build-web.result)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4.2.2
      - uses: actions/setup-python@v5.6.0
        with:
          python-version: '3.12'
      - name: Start services
        run: |
          for i in 1 2 3; do
            docker compose up -d --wait && break || sleep 15
          done
      - name: Install e2e dependencies
        run: pip install -r tests/e2e/requirements.txt
      - name: Run e2e tests
        env:
          BASE_URL: http://localhost:5500
        run: pytest tests/e2e/
      - name: Show logs on failure
        if: failure()
        run: docker compose logs --no-color
      - name: Stop services
        if: always()
        run: docker compose down

  # ─── UI-тесты ─────────────────────────────────────────────────────────────
  # Запускается если изменились инфраструктура (ui filter) или любой из компонентов.
  # build-* jobs могут быть skipped (компонент не менялся) — это допустимо;
  # ui-test блокируется только при явном failure одного из build-* jobs.
  ui-test:
    needs: [changes, build-cookbook, build-apigateway, build-web]
    if: |
      always() &&
      needs.changes.outputs.ui == 'true' ||
      needs.changes.outputs.backend == 'true' ||
      needs.changes.outputs.web == 'true' &&
      contains(fromJSON('["success", "skipped"]'), needs.build-cookbook.result) &&
      contains(fromJSON('["success", "skipped"]'), needs.build-apigateway.result) &&
      contains(fromJSON('["success", "skipped"]'), needs.build-web.result)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4.2.2
      - uses: actions/setup-python@v5.6.0
        with:
          python-version: '3.12'
      - name: Start services
        run: |
          for i in 1 2 3; do
            docker compose up -d --wait && break || sleep 15
          done
      - name: Install UI test dependencies
        run: pip install -r tests/ui/requirements.txt
      - name: Install Playwright browsers
        run: playwright install --with-deps chromium
      - name: Run UI tests
        env:
          BASE_URL: http://localhost:5500
        run: pytest tests/ui/
      - name: Show logs on failure
        if: failure()
        run: docker compose logs --no-color
      - name: Stop services
        if: always()
        run: docker compose down
