/* --------- PHOTO PLACEHOLDER (deterministic gradient) ----- */
function recipePhoto(seed, title) {
  const hues = [
    ['#7d79e7', '#a279e6'],
    ['#ff6cb2', '#9968ff'],
    ['#ffaf56', '#ff6cb2'],
    ['#76d9a3', '#7d79e7'],
    ['#9968ff', '#7d79e7'],
    ['#ffaf56', '#9968ff'],
    ['#a279e6', '#ff6cb2'],
    ['#76d9a3', '#9968ff'],
  ];
  const h = hues[Math.abs(hash(seed)) % hues.length];
  const initials = (title || '?').split(/\s+/).slice(0, 2).map(s => s[0] || '').join('').toUpperCase();
  return `<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 200" preserveAspectRatio="xMidYMid slice">
    <defs>
      <linearGradient id="g${hash(seed)}" x1="0" y1="0" x2="1" y2="1">
        <stop offset="0%" stop-color="${h[0]}"/>
        <stop offset="100%" stop-color="${h[1]}"/>
      </linearGradient>
      <radialGradient id="r${hash(seed)}" cx="80%" cy="20%" r="60%">
        <stop offset="0%" stop-color="rgba(255,255,255,0.35)"/>
        <stop offset="100%" stop-color="rgba(255,255,255,0)"/>
      </radialGradient>
    </defs>
    <rect width="320" height="200" fill="url(#g${hash(seed)})"/>
    <rect width="320" height="200" fill="url(#r${hash(seed)})"/>
    <text x="50%" y="55%" text-anchor="middle" fill="rgba(255,255,255,0.85)" font-family="Inter, sans-serif" font-weight="500" font-size="56" letter-spacing="-2">${escapeHtml(initials)}</text>
  </svg>`;
}
function hash(s) { s = String(s); let h = 0; for (let i = 0; i < s.length; i++) h = (h << 5) - h + s.charCodeAt(i); return h; }
function escapeHtml(s) { return String(s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }

/* --------- AUTH ------------------------------------------ */
function fakeJwt(user) {
  return btoa(JSON.stringify({ uid: user.id, role: user.role, exp: Date.now() + 86400000 * 30 }));
}
function parseToken(t) {
  try { return JSON.parse(atob(t)); } catch { return null; }
}
function currentUser() {
  const t = sessionState.token || localStorage.getItem('cookbook:token');
  if (!t) return null;
  const data = parseToken(t);
  if (!data || data.exp < Date.now()) return null;
  return state.users.find(u => u.id === data.uid) || null;
}
function setRoleAttr() {
  const u = currentUser();
  document.body.dataset.role = u ? u.role : 'guest';
}

  if (!u) throw { code: 401, message: 'Требуется авторизация' };
  return u;
}
function requireRole(role) {
  const u = requireAuth();
  if (role === 'admin' && u.role !== 'admin') throw { code: 403, message: 'Недостаточно прав' };
  return u;
}

    const i = state.ingredients.find(x => x.id === id);
    if (!i) throw { code: 404, message: 'Не найдено' };
    if (i.is_system && u.role !== 'admin') throw { code: 403, message: 'Системный — только админ' };
    if (!i.is_system && i.author_id !== u.id && u.role !== 'admin') throw { code: 403, message: 'Не ваш ингредиент' };
    Object.assign(i, payload); saveState();
    return i;
  },
  async deleteIngredient(id) {
    const u = requireAuth();
    await delay();
    const i = state.ingredients.find(x => x.id === id);
    if (!i) throw { code: 404, message: 'Не найдено' };
    if (i.is_system && u.role !== 'admin') throw { code: 403, message: 'Только админ' };
    if (!i.is_system && i.author_id !== u.id && u.role !== 'admin') throw { code: 403, message: 'Только автор' };
    const used = state.recipes.filter(r => r.ingredients.some(x => x.ingredient_id === id));
    if (used.length) throw { code: 409, message: 'Используется в рецептах: ' + used.slice(0, 10).map(r => r.title).join(', ') + (used.length > 10 ? ` и ещё ${used.length - 10}` : '') };
    state.ingredients = state.ingredients.filter(x => x.id !== id); saveState();
  },

  async getCategories() { await delay(120, 250); return state.categories; },
  async createCategory(payload) {
    requireRole('admin'); await delay();
    const c = { id: 'c' + Date.now(), ...payload };
    state.categories.push(c); saveState();
    return c;
  },
  async updateCategory(id, payload) {
    requireRole('admin'); await delay();
    const c = state.categories.find(x => x.id === id);
    if (!c) throw { code: 404, message: 'Не найдено' };
    delete payload.type; // type immutable
    Object.assign(c, payload); saveState();
    return c;
  },
  async deleteCategory(id) {
    requireRole('admin'); await delay();
    if (state.recipes.some(r => r.categories.find(c => c.id === id))) throw { code: 409, message: 'Используется в рецептах' };
    state.categories = state.categories.filter(x => x.id !== id); saveState();
  },

  async getDashboardStats() {
    await delay();
    const u = currentUser();
    const all = state.recipes.filter(r => r.is_public || (u && (u.id === r.author_id || u.role === 'admin')));
    const sortedByRating = [...all].sort((a, b) => avgRating(b.id) - avgRating(a.id));
    return {
      totalRecipes: all.length,
      totalUsers: state.users.length,
      totalComments: state.comments.length,
      myRecipes: u ? all.filter(r => r.author_id === u.id).length : 0,
      myComments: u ? state.comments.filter(c => c.author_id === u.id).length : 0,
      top10: sortedByRating.slice(0, 10).map(r => ({ id: r.id, title: r.title, rating: avgRating(r.id) })),
      topFav: u ? sortedByRating
        .filter(r => state.favorites.some(f => f.user_id === u.id && f.recipe_id === r.id))
        .slice(0, 10).map(r => ({ id: r.id, title: r.title, rating: avgRating(r.id) })) : [],
      byMainIng: tally(all, 'main_ingredient'),
      byCuisine: tally(all, 'cuisine'),
      topUsersByRating: topUsersBy(state.ratings.map(r => r.user_id)),
      topUsersByComments: topUsersBy(state.comments.map(c => c.author_id)),
      planFill: u && state.mealPlans[u.id] ? Object.fromEntries(Object.entries(state.mealPlans[u.id]).map(([k, v]) => [k, v.length > 0])) : {},
    };
  },
};

function avgRating(recipeId) {
  const arr = state.ratings.filter(r => r.recipe_id === recipeId);
  if (!arr.length) return 0;
  return arr.reduce((s, r) => s + r.value, 0) / arr.length;
}
function myRating(recipeId) {
  const u = currentUser(); if (!u) return 0;
  const r = state.ratings.find(x => x.recipe_id === recipeId && x.user_id === u.id);
  return r ? r.value : 0;
}
function tally(recipes, type) {
  const m = new Map();
  recipes.forEach(r => r.categories.filter(c => c.type === type).forEach(c => m.set(c.name, (m.get(c.name) || 0) + 1)));
  return [...m.entries()].sort((a, b) => b[1] - a[1]);
}
function topUsersBy(arr) {
  const m = new Map();
  arr.forEach(uid => m.set(uid, (m.get(uid) || 0) + 1));
  return [...m.entries()].sort((a, b) => b[1] - a[1]).slice(0, 10)
    .map(([uid, n]) => ({ name: state.users.find(u => u.id === uid)?.display_name || '—', count: n }));
}

/* --------- ROUTER ---------------------------------------- */
const routes = [
  { re: /^#\/recipes\/new$/, view: 'recipeForm' },
  { re: /^#\/recipes\/([^/]+)\/edit$/, view: 'recipeForm', extract: m => ({ id: m[1] }) },
  { re: /^#\/recipes\/([^/]+)$/, view: 'recipeDetail', extract: m => ({ id: m[1] }) },
  { re: /^#\/recipes$/, view: 'recipesList' },
  { re: /^#\/planner$/, view: 'planner' },
  { re: /^#\/shopping-list$/, view: 'shoppingList' },
  { re: /^#\/ingredients$/, view: 'ingredients', guard: 'user' },
  { re: /^#\/categories$/, view: 'categories' },
  { re: /^#\/dashboard$/, view: 'dashboard' },
  { re: /^#\/login$/, view: 'login' },
  { re: /^#\/register$/, view: 'register' },
];

function go(hash) { if (location.hash !== hash) location.hash = hash; else handleRoute(); }
function handleRoute() {
  const hash = location.hash || '#/recipes';
  for (const r of routes) {
    const m = hash.match(r.re);
    if (m) {
      if (r.guard === 'user' && !currentUser()) { toast('Войдите, чтобы открыть раздел', 'error'); openLoginModal(); go('#/recipes'); return; }
      if (r.guard === 'admin' && (!currentUser() || currentUser().role !== 'admin')) { toast('Только для администратора', 'error'); go('#/recipes'); return; }
      renderView(r.view, r.extract ? r.extract(m) : {}); return;
    }
  }
  renderView('recipesList', {});
}
window.addEventListener('hashchange', handleRoute);

/* --------- TOAST + MODAL --------------------------------- */
function toast(msg, kind = '') {
  const stack = document.getElementById('toast-stack');
  const el = document.createElement('div');
  el.className = 'toast' + (kind ? ' toast-' + kind : '');
  el.innerHTML = `<span class="dotty"></span><span>${escapeHtml(msg)}</span>`;
  stack.appendChild(el);
  requestAnimationFrame(() => el.classList.add('is-show'));
  setTimeout(() => { el.classList.remove('is-show'); setTimeout(() => el.remove(), 350); }, 3200);
}

let modalCloseCb = null;
function openModal(html, onClose) {
  const root = document.getElementById('modal-root');
  root.innerHTML = `<div class="modal">${html}</div>`;
  modalCloseCb = onClose || null;
  requestAnimationFrame(() => root.classList.add('is-open'));
  root.onclick = (e) => { if (e.target === root) closeModal(); };
}
function closeModal() {
  const root = document.getElementById('modal-root');
  root.classList.remove('is-open');
  setTimeout(() => { root.innerHTML = ''; if (modalCloseCb) modalCloseCb(); modalCloseCb = null; }, 200);
}
function handleApiError(e) {
  console.warn(e);
  if (e && e.code === 401) { toast(e.message || 'Требуется вход', 'error'); openLoginModal(); return; }
  if (e && e.code === 403) { toast(e.message || 'Нет прав', 'error'); return; }
  if (e && e.code === 404) { toast(e.message || 'Не найдено', 'error'); return; }
  toast(e?.message || 'Ошибка', 'error');
}

function diffLabel(d) {
  return { easy: 'Простой', everyday: 'Повседневный', festive: 'Праздничный', restaurant: 'Ресторанный', signature: 'Авторский' }[d] || d;
}

function showAutocomplete(q, ac, input) {
  q = (q || '').trim().toLowerCase();
  if (!q || q.length < 2) { ac.classList.remove('is-open'); return; }
  const last = q.split(/\s+/).pop();
  const cats = state.categories.filter(c => c.name.toLowerCase().includes(last)).slice(0, 6);
  const ings = state.ingredients.filter(i => i.title.toLowerCase().includes(last)).slice(0, 6);
  if (!cats.length && !ings.length) { ac.classList.remove('is-open'); return; }
  ac.innerHTML = [
    ...cats.map(c => `<div class="autocomplete-item" data-pick="${escapeHtml(c.name)}"><span>${escapeHtml(c.name)}</span><span class="kind">категория</span></div>`),
    ...ings.map(i => `<div class="autocomplete-item" data-pick="${escapeHtml(i.title)}"><span>${escapeHtml(i.title)}</span><span class="kind">ингредиент</span></div>`)
  ].join('');
  ac.classList.add('is-open');
  ac.querySelectorAll('[data-pick]').forEach(el => el.onmousedown = () => {
    const words = input.value.split(/\s+/); words.pop(); words.push(el.dataset.pick);
    input.value = words.join(' ') + ' ';
    input.dispatchEvent(new Event('input'));
  });
}

views.recipeDetail = async (main, { id }) => {
  const u = currentUser();
  main.innerHTML = `<div class="state"><div class="state-eyebrow">Загружаем</div><div class="skeleton skeleton-card" style="width:100%;max-width:720px"></div></div>`;
  let r;
  try { r = await fakeApi.getRecipe(id); } catch (e) { handleApiError(e); main.innerHTML = ''; return; }
  let servings = r.servings;
  const author = state.users.find(x => x.id === r.author_id);
  const avg = avgRating(r.id), my = myRating(r.id);
  const isFav = u && state.favorites.some(f => f.user_id === u.id && f.recipe_id === r.id);
  const canEdit = u && (u.id === r.author_id || u.role === 'admin');

  const renderPage = () => {
    main.innerHTML = `
      <div class="detail-bar">
        <button class="btn btn-ghost btn-sm back-btn" id="back-btn">${ICONS.arrowLeft}<span>Назад</span></button>
        <span class="title">${escapeHtml(r.title)}</span>
        <span class="spacer"></span>
        <span class="meta">
          <span>${ICONS.clock}${r.cooking_time} мин</span><span class="sep"></span>
          <span>${ICONS.flame}${diffLabel(r.difficulty)}</span><span class="sep"></span>
          <span class="rating"><span class="star">${ICONS.star}</span>${avg ? avg.toFixed(1) : '—'}</span><span class="sep"></span>
          <span>${ICONS.user}${escapeHtml(author?.display_name || '—')}</span>
          ${!r.is_public ? `<span class="sep"></span><span class="tag tag-private">${ICONS.lock}<span>Приватный</span></span>` : ''}
        </span>
      </div>
      <div class="detail-toolbar">
        <div class="detail-tags">${r.categories.map(c => `<span class="tag">${escapeHtml(c.name)}</span>`).join('')}</div>
        <div class="detail-actions">
          ${u ? `<button class="btn ${isFav?'btn-primary':'btn-ghost'} btn-sm" id="fav-btn">${isFav?ICONS.heartFill:ICONS.heart}<span>${isFav?'В избранном':'В избранное'}</span></button>` : ''}
          ${canEdit ? `<a class="btn btn-ghost btn-sm" href="#/recipes/${r.id}/edit">${ICONS.edit}<span>Редактировать</span></a>` : ''}
          ${canEdit ? `<button class="btn btn-danger btn-sm" id="delete-btn">${ICONS.trash}<span>Удалить</span></button>` : ''}
        </div>
      </div>
      <div class="detail-grid">
        <div class="gallery">
          <div class="main-photo">${recipePhoto(r.id, r.title)}</div>
          <p class="t-small" style="color:var(--fg-secondary);font-size:15px;margin-top:6px">${escapeHtml(r.description || '')}</p>
          <h3 class="t-subheading" style="margin-top:14px">Шаги приготовления</h3>
          <div class="instructions-text">${escapeHtml(Array.isArray(r.instructions) ? r.instructions.join('\n\n') : (r.instructions || ''))}</div>
        </div>
        <div style="display:flex;flex-direction:column;gap:24px">
          <div class="card card-pad-lg">
            <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:14px">
              <h3 class="t-subheading">Ингредиенты</h3>
              <div class="servings-control">
                <button id="serv-minus">${ICONS.minus}</button>
                <span class="value" id="serv-value">${servings}</span>
                <button id="serv-plus">${ICONS.plus}</button>
              </div>
            </div>
            <div class="ingredients-list" id="ing-list"></div>
            <p class="t-micro" style="margin-top:10px">на ${servings} порц.</p>
          </div>
          <div class="card card-pad-lg">
            <h3 class="t-subheading" style="margin-bottom:12px">Ваш рейтинг</h3>
            ${u ? `<div class="rating-widget"><div class="stars" id="rate-stars">${[1,2,3,4,5].map(i => `<button data-v="${i}" class="${i<=my?'is-on':''}">${ICONS.star}</button>`).join('')}</div><span class="t-small" id="rate-info">${my ? `Вы поставили ${my}/5` : 'Поставьте оценку'}</span></div>` : '<p class="t-small">Войдите, чтобы оценить рецепт.</p>'}
          </div>
          <div class="card card-pad-lg">
            <h3 class="t-subheading" style="margin-bottom:12px">Комментарии</h3>
            <div id="comments-area"></div>
          </div>
        </div>
      </div>`;

    const renderIng = () => {
      const scale = servings / r.servings;
      main.querySelector('#serv-value').textContent = servings;
      main.querySelector('#ing-list').innerHTML = r.ingredients.map(ri => {
        const ing = state.ingredients.find(x => x.id === ri.ingredient_id);
        if (!ing) return '';
        return `<div class="ingredient-row"><span class="name">${escapeHtml(ing.title)}</span><span class="amount">${formatAmount(ri.amount * scale)} ${escapeHtml(ing.unit)}</span></div>`;
      }).join('');
    };
    renderIng();
    main.querySelector('#serv-plus').onclick = () => { servings = Math.min(99, servings + 1); renderIng(); };
    main.querySelector('#serv-minus').onclick = () => { servings = Math.max(1, servings - 1); renderIng(); };

    main.querySelector('#back-btn').onclick = () => { sessionState.viewState.recipesScroll = 0; history.length > 1 ? history.back() : go('#/recipes'); };

    const fb = main.querySelector('#fav-btn');
    if (fb) fb.onclick = async () => {
      try { const on = await fakeApi.toggleFavorite(r.id); toast(on ? 'В избранном' : 'Удалено', 'success'); views.recipeDetail(main, { id }); } catch (e) { handleApiError(e); }
    };
    const db = main.querySelector('#delete-btn');
    if (db) db.onclick = () => {
      openModal(`<div class="modal-head"><h2>Удалить рецепт?</h2><button class="modal-close" onclick="closeModal()">${ICONS.x}</button></div>
        <p class="t-small">«${escapeHtml(r.title)}» будет удалён без возможности восстановления.</p>
        <div class="form-actions"><button class="btn btn-ghost" onclick="closeModal()">Отмена</button><button class="btn btn-danger" id="confirm-del">Удалить</button></div>`);
      document.getElementById('confirm-del').onclick = async () => {
        try { await fakeApi.deleteRecipe(r.id); closeModal(); toast('Рецепт удалён', 'success'); go('#/recipes'); }
        catch (e) { handleApiError(e); }
      };
    };
    const stars = main.querySelector('#rate-stars');
    if (stars) stars.querySelectorAll('button').forEach(b => b.onclick = async () => {
      const v = +b.dataset.v;
      try { await fakeApi.rateRecipe(r.id, v); toast('Оценка сохранена', 'success'); views.recipeDetail(main, { id }); }
      catch (e) { handleApiError(e); }
    });

    renderComments();
  };

  function renderComments() {
    const area = main.querySelector('#comments-area');
    const list = state.comments.filter(c => c.recipe_id === r.id).sort((a, b) => b.created_at.localeCompare(a.created_at));
    const myComment = u ? list.find(c => c.author_id === u.id) : null;
    const items = list.map(c => {
      const author = state.users.find(x => x.id === c.author_id);
      const canDelete = u && (u.id === c.author_id || u.id === r.author_id || u.role === 'admin');
      return `<div class="comment"><span class="avatar">${escapeHtml((author?.display_name || '?').slice(0,1))}</span>
        <div><div class="comment-head"><span class="author">${escapeHtml(author?.display_name || '—')}</span><span class="time">${formatDate(c.created_at)}</span></div>
        <div class="text">${escapeHtml(c.text)}</div>
        ${canDelete ? `<div style="margin-top:8px"><button class="btn btn-ghost btn-sm" data-del="${c.id}">${ICONS.trash}<span>Удалить</span></button></div>` : ''}
        </div></div>`;
    }).join('') || `<p class="t-small">Пока нет комментариев — будьте первым.</p>`;

    const form = u && !myComment ? `
      <form id="comment-form" style="margin-top:14px;display:flex;flex-direction:column;gap:10px">
        <textarea class="textarea" maxlength="2000" name="text" required placeholder="Поделитесь впечатлением (до 2000 символов)"></textarea>
        <div style="display:flex;justify-content:flex-end"><button class="btn btn-primary btn-sm">Отправить</button></div>
      </form>` : (myComment ? '<p class="t-micro" style="margin-top:10px">Вы уже оставили комментарий — спасибо.</p>' : '<p class="t-micro" style="margin-top:10px">Войдите, чтобы оставить комментарий.</p>');

    area.innerHTML = `<div class="comments-list">${items}</div>${form}`;
    area.querySelectorAll('[data-del]').forEach(b => b.onclick = async () => {
      try { await fakeApi.deleteComment(b.dataset.del); toast('Комментарий удалён', 'success'); renderComments(); } catch (e) { handleApiError(e); }
    });
    const f = area.querySelector('#comment-form');
    if (f) f.onsubmit = async (e) => {
      e.preventDefault();
      const text = new FormData(e.target).get('text');
      try { await fakeApi.addComment(r.id, text); toast('Комментарий опубликован', 'success'); renderComments(); }
      catch (err) { handleApiError(err); }
    };
  }
  renderPage();
};

function formatAmount(n) { return Math.round(n * 100) / 100; }
function formatDate(iso) { const d = new Date(iso); return d.toLocaleString('ru', { day: 'numeric', month: 'short', hour: '2-digit', minute: '2-digit' }); }

/* ---- RECIPE FORM ---------------------------------------- */
views.recipeForm = async (main, { id } = {}) => {
  const u = currentUser();
  if (!u) { openLoginModal(); main.innerHTML = ''; return; }
  let r = id ? state.recipes.find(x => x.id === id) : null;
  if (id && !r) { toast('Рецепт не найден', 'error'); go('#/recipes'); return; }
  if (r && r.author_id !== u.id && u.role !== 'admin') { toast('Нет прав', 'error'); go('#/recipes/' + id); return; }
  const draft = r ? JSON.parse(JSON.stringify(r)) : {
    title: '', description: '', cooking_time: 30, difficulty: 'easy', servings: 2,
    is_public: true, categories: [], ingredients: [], instructions: ''
  };
  // normalize legacy array form
  if (Array.isArray(draft.instructions)) draft.instructions = draft.instructions.join('\n\n');

  const renderForm = () => {
    main.innerHTML = `
      <form id="recipe-form" class="card card-pad-lg" style="display:flex;flex-direction:column;gap:18px">
        <h1 class="t-subheading">${r ? 'Редактирование рецепта' : 'Новый рецепт'}</h1>
        <div class="field"><label>Название</label><input class="input" name="title" required maxlength="200" value="${escapeHtml(draft.title)}" /></div>
        <div class="field"><label>Описание</label><textarea class="textarea" name="description" maxlength="2000">${escapeHtml(draft.description || '')}</textarea></div>
        <div class="field-row">
          <div class="field"><label>Время (мин)</label><input class="input" name="cooking_time" type="number" min="1" max="9999" required value="${draft.cooking_time}" /></div>
          <div class="field"><label>Порции</label><input class="input" name="servings" type="number" min="1" max="99" required value="${draft.servings}" /></div>
        </div>
        <div class="field-row">
          <div class="field"><label>Сложность</label><select class="select" name="difficulty">
            ${['easy','everyday','festive','restaurant','signature'].map(d => `<option value="${d}" ${draft.difficulty===d?'selected':''}>${diffLabel(d)}</option>`).join('')}
          </select></div>
          <div class="field"><label>Видимость</label>
            <label class="checkbox"><input type="checkbox" name="is_public" ${draft.is_public?'checked':''}/> Публичный (виден всем)</label>
          </div>
        </div>
        <div class="field">
          <label>Категории (не более одной на тип)</label>
          <div class="tag-input" id="cat-input">
            <input type="text" id="cat-search" placeholder="${draft.categories.length?'Добавьте ещё…':'Начните вводить категорию…'}" />
            <div class="autocomplete" id="cat-ac"></div>
          </div>
        </div>
        <div class="field">
          <label>Ингредиенты</label>
          <div id="ing-rows" style="display:flex;flex-direction:column;gap:8px"></div>
          <button type="button" class="btn btn-ghost btn-sm" id="ing-add" style="margin-top:8px;align-self:flex-start">${ICONS.plus}<span>Добавить ингредиент</span></button>
        </div>
        <div class="field">
          <label>Шаги приготовления</label>
          <textarea class="textarea" id="instructions-input" name="instructions" style="min-height:180px" maxlength="10000" placeholder="Опишите процесс приготовления в свободной форме">${escapeHtml(draft.instructions || '')}</textarea>
        </div>
        <div class="form-actions">
          <a class="btn btn-ghost" href="#/recipes${r?'/'+r.id:''}">Отмена</a>
          <button type="submit" class="btn btn-primary">${r ? 'Сохранить' : 'Опубликовать'}</button>
        </div>
      </form>`;

    // Categories tag input
    const catInput = main.querySelector('#cat-input');
    const catSearch = main.querySelector('#cat-search');
    const catAc = main.querySelector('#cat-ac');
    const renderCats = () => {
      catInput.querySelectorAll('.chip').forEach(c => c.remove());
      draft.categories.forEach(c => {
        const chip = document.createElement('span');
        chip.className = 'chip';
        chip.innerHTML = `<span>${escapeHtml(c.name)}</span><button type="button">${ICONS.x}</button>`;
        chip.querySelector('button').onclick = () => { draft.categories = draft.categories.filter(x => x.id !== c.id); renderCats(); };
        catInput.insertBefore(chip, catSearch);
      });
    };
    renderCats();
    catSearch.oninput = () => {
      const q = catSearch.value.toLowerCase().trim();
      if (!q) { catAc.classList.remove('is-open'); return; }
      const list = state.categories.filter(c => c.name.toLowerCase().includes(q)).slice(0, 8);
      if (!list.length) { catAc.classList.remove('is-open'); return; }
      catAc.innerHTML = list.map(c => `<div class="autocomplete-item" data-id="${c.id}"><span>${escapeHtml(c.name)}</span><span class="kind">${CATEGORY_TYPES[c.type]}</span></div>`).join('');
      catAc.classList.add('is-open');
      catAc.querySelectorAll('[data-id]').forEach(el => el.onmousedown = (ev) => {
        ev.preventDefault();
        const cat = state.categories.find(c => c.id === el.dataset.id);
        draft.categories = draft.categories.filter(c => c.type !== cat.type);
        draft.categories.push(cat);
        catSearch.value = ''; catAc.classList.remove('is-open');
        renderCats();
      });
    };
    catSearch.onblur = () => setTimeout(() => catAc.classList.remove('is-open'), 150);

    // Ingredients
    const ingRows = main.querySelector('#ing-rows');
    const renderIngs = () => {
      ingRows.innerHTML = draft.ingredients.map((ri, idx) => {
        const ing = state.ingredients.find(x => x.id === ri.ingredient_id);
        return `<div class="ing-row" data-idx="${idx}">
          <select class="input">${state.ingredients.filter(i => i.is_system || i.author_id === u.id).map(i => `<option value="${i.id}" ${i.id===ri.ingredient_id?'selected':''}>${escapeHtml(i.title)}</option>`).join('')}</select>
          <input class="input" type="number" step="0.01" min="0.01" max="100000" value="${ri.amount}" />
          <span class="t-small">${escapeHtml(ing?.unit || '')}</span>
          <button type="button" class="remove">${ICONS.x}</button>
        </div>`;
      }).join('');
      ingRows.querySelectorAll('.ing-row').forEach(row => {
        const idx = +row.dataset.idx;
        row.querySelector('select').onchange = (e) => { draft.ingredients[idx].ingredient_id = e.target.value; renderIngs(); };
        row.querySelector('input').onchange = (e) => { draft.ingredients[idx].amount = parseFloat(e.target.value); };
        row.querySelector('.remove').onclick = () => { draft.ingredients.splice(idx, 1); renderIngs(); };
      });
    };
    renderIngs();
    main.querySelector('#ing-add').onclick = () => {
      const first = state.ingredients.find(i => i.is_system || i.author_id === u.id);
      draft.ingredients.push({ ingredient_id: first?.id, amount: first?.default_amount || 100 });
      renderIngs();
    };

    main.querySelector('#instructions-input').oninput = (e) => { draft.instructions = e.target.value; };

    main.querySelector('#recipe-form').onsubmit = async (e) => {
      e.preventDefault();
      const fd = new FormData(e.target);
      const payload = {
        title: fd.get('title').trim(),
        description: fd.get('description').trim(),
        cooking_time: parseInt(fd.get('cooking_time')),
        servings: parseInt(fd.get('servings')),
        difficulty: fd.get('difficulty'),
        is_public: fd.get('is_public') === 'on',
        categories: draft.categories,
        ingredients: draft.ingredients.filter(i => i.ingredient_id && i.amount > 0),
        instructions: (draft.instructions || '').trim(),
      };
      try {
        const saved = r ? await fakeApi.updateRecipe(r.id, payload) : await fakeApi.createRecipe(payload);
        toast(r ? 'Сохранено' : 'Опубликовано', 'success');
        go('#/recipes/' + saved.id);
      } catch (err) { handleApiError(err); }
    };
  };
  renderForm();
};

/* ---- PLANNER ------------------------------------------- */
let dragRecipeId = null;
views.planner = async (main) => {
  const u = currentUser();
  if (!u) { openLoginModal(); main.innerHTML = '<div class="state"><div class="state-eyebrow">Требуется авторизация</div></div>'; return; }
  let plan;
  try { plan = await fakeApi.getMealPlan(); } catch (e) { handleApiError(e); return; }
  let panelMode = 'all', panelQ = '';

  const render = () => {
    main.innerHTML = `
      <div class="page-heading">
        <h1>Меню на <span class="t-gradient">неделю</span></h1>
        <div style="display:flex;gap:8px">
          <a class="btn btn-ghost btn-sm" href="#/shopping-list">${ICONS.cart}<span>Список покупок</span></a>
          <button class="btn btn-danger btn-sm" id="clear-all">${ICONS.trash}<span>Очистить</span></button>
        </div>
      </div>
      <div class="planner">
        <div class="planner-panel">
          <div style="display:flex;gap:12px;align-items:center;flex-wrap:wrap">
            <div class="segmented" id="planner-mode">
              <button class="${panelMode==='all'?'is-active':''}" data-mode="all">Все</button>
              <button class="${panelMode==='favorites'?'is-active':''}" data-mode="favorites">Избранное</button>
              <button class="${panelMode==='mine'?'is-active':''}" data-mode="mine">Мои</button>
            </div>
            <div class="search-wrap" style="flex:1;min-width:200px">
              <span class="search-icon">${ICONS.search}</span>
              <input class="search-input" id="panel-q" placeholder="Поиск рецептов…" value="${escapeHtml(panelQ)}" />
            </div>
          </div>
          <div class="scroll" id="panel-list"></div>
        </div>
        <div class="planner-grid" id="grid">
          <div></div>
          ${DAY_LABELS.map(d => `<div class="planner-head-cell">${d}</div>`).join('')}
          ${MEAL_KEYS.map(m => `
            <div class="planner-row-label">${MEAL_LABELS[m]}</div>
            ${DAY_LABELS.map((_, d) => `<div class="planner-slot" data-key="${d}_${m}"></div>`).join('')}
          `).join('')}
        </div>
      </div>`;

    document.getElementById('clear-all').onclick = () => {
      openModal(`<div class="modal-head"><h2>Очистить план?</h2><button class="modal-close" onclick="closeModal()">${ICONS.x}</button></div>
        <p class="t-small">Все слоты будут пусты.</p>
        <div class="form-actions"><button class="btn btn-ghost" onclick="closeModal()">Отмена</button><button class="btn btn-danger" id="ok">Очистить</button></div>`);
      document.getElementById('ok').onclick = async () => {
        for (const k of Object.keys(plan)) plan[k] = [];
        await fakeApi.updateMealPlan(plan);
        closeModal(); toast('План очищен', 'success'); render();
      };
    };

    document.querySelectorAll('#planner-mode button').forEach(b => b.onclick = () => { panelMode = b.dataset.mode; renderPanel(); document.querySelectorAll('#planner-mode button').forEach(x => x.classList.toggle('is-active', x===b)); });
    document.getElementById('panel-q').oninput = (e) => { panelQ = e.target.value; renderPanel(); };

    renderPanel();
    renderGrid();
  };

  function getPanelRecipes() {
    const me = currentUser();
    let list = state.recipes.filter(r => r.is_public || r.author_id === me.id || me.role === 'admin');
    if (panelMode === 'favorites') {
      const favs = new Set(state.favorites.filter(f => f.user_id === me.id).map(f => f.recipe_id));
      list = list.filter(r => favs.has(r.id));
    } else if (panelMode === 'mine') list = list.filter(r => r.author_id === me.id);
    if (panelQ) {
      const words = panelQ.toLowerCase().trim().split(/\s+/);
      list = list.filter(r => {
        const hay = (r.title + ' ' + (r.description || '')).toLowerCase();
        return words.every(w => hay.includes(w));
      });
    }
    return list;
  }

  function renderPanel() {
    const list = getPanelRecipes();
    const panel = document.getElementById('panel-list');
    if (!list.length) { panel.innerHTML = `<div class="state" style="padding:20px"><p class="t-small">Ничего не найдено</p></div>`; return; }
    panel.innerHTML = list.map(r => `
      <div class="planner-recipe" draggable="true" data-id="${r.id}">
        <div class="photo">${recipePhoto(r.id, r.title)}</div>
        <div class="name">${escapeHtml(r.title)}</div>
      </div>`).join('');
    panel.querySelectorAll('.planner-recipe').forEach(el => {
      el.ondragstart = (e) => { dragRecipeId = el.dataset.id; e.dataTransfer.effectAllowed = 'copy'; e.dataTransfer.setData('text/plain', el.dataset.id); el.style.opacity = 0.5; };
      el.ondragend = () => { el.style.opacity = 1; dragRecipeId = null; };
    });
  }
  function renderGrid() {
    document.querySelectorAll('.planner-slot').forEach(slot => {
      const key = slot.dataset.key;
      const items = plan[key] || [];
      slot.classList.remove('is-empty');
      if (!items.length) { slot.classList.add('is-empty'); slot.innerHTML = `<span>—</span>`; }
      else slot.innerHTML = items.map((it, idx) => {
        const r = state.recipes.find(x => x.id === it.recipe_id);
        if (!r) return '';
        return `<div class="planner-slot-item">
          <div class="thumb">${recipePhoto(r.id, r.title)}</div>
          <div class="info"><span class="name">${escapeHtml(r.title)}</span>
            <span class="servings-mini">порц.: <input type="number" min="1" max="99" value="${it.servings}" data-key="${key}" data-idx="${idx}" /></span>
          </div>
          <button class="remove" data-rmkey="${key}" data-rmidx="${idx}">${ICONS.x}</button>
        </div>`;
      }).join('');
      slot.ondragover = (e) => { e.preventDefault(); slot.classList.add('is-dragover'); };
      slot.ondragleave = () => slot.classList.remove('is-dragover');
      slot.ondrop = async (e) => {
        e.preventDefault(); slot.classList.remove('is-dragover');
        const id = dragRecipeId || e.dataTransfer.getData('text/plain');
        if (!id) return;
        const r = state.recipes.find(x => x.id === id);
        if (!r) return;
        plan[key] = [...(plan[key] || []), { recipe_id: id, servings: r.servings }];
        await fakeApi.updateMealPlan(plan);
        renderGrid(); toast('Добавлено в план', 'success');
      };
    });
    document.querySelectorAll('input[data-key]').forEach(inp => inp.onchange = async (e) => {
      const k = inp.dataset.key, i = +inp.dataset.idx;
      plan[k][i].servings = Math.max(1, Math.min(99, parseInt(e.target.value) || 1));
      await fakeApi.updateMealPlan(plan);
      toast('Сохранено', 'success');
    });
    document.querySelectorAll('button[data-rmkey]').forEach(btn => btn.onclick = async () => {
      const k = btn.dataset.rmkey, i = +btn.dataset.rmidx;
      plan[k].splice(i, 1);
      await fakeApi.updateMealPlan(plan);
      renderGrid(); toast('Удалено', 'success');
    });
  }
  render();
};

views.shoppingList = async (main) => {
  const u = currentUser();
  if (!u) { openLoginModal(); main.innerHTML = ''; return; }
  main.innerHTML = `<div class="page-heading">
    <h1>Список <span class="t-gradient">покупок</span></h1>
    <div style="display:flex;gap:8px">
      <button class="btn btn-ghost btn-sm" id="copy-btn">${ICONS.copy}<span>Скопировать</span></button>
      <button class="btn btn-primary btn-sm" id="print-btn">${ICONS.print}<span>Распечатать</span></button>
    </div>
  </div>
  <div id="sl-area"><div class="skeleton" style="height:200px"></div></div>`;

  try { grouped = await fakeApi.getShoppingList(); } catch (e) { handleApiError(e); return; }

    area.innerHTML = `<div class="state">
      <div class="state-eyebrow">Пустой план</div>
      <div class="t-display">Добавьте блюда в планировщик</div>

};

/* ---- INGREDIENTS ---------------------------------------- */
views.ingredients = async (main) => {
  let q = '', category = '', authorId = '';
  const u = currentUser();
  const render = async () => {
    main.innerHTML = `<div class="page-heading">
      <h1>Ингредиенты</h1>
      ${u ? `<button class="btn btn-primary btn-sm" id="add-btn">${ICONS.plus}<span>Новый ингредиент</span></button>` : ''}
    </div>
    <div class="toolbar">
      <div class="search-wrap"><span class="search-icon">${ICONS.search}</span><input class="search-input" id="i-q" placeholder="Найти ингредиент…" value="${escapeHtml(q)}" /></div>
      <select class="select" id="i-cat" style="max-width:240px">
        <option value="">Все категории</option>
        ${INGREDIENT_CATEGORIES.map(c => `<option value="${c}" ${c===category?'selected':''}>${c}</option>`).join('')}
      </select>
      ${u && u.role === 'admin' ? `<select class="select" id="i-author" style="max-width:200px">
        <option value="">Все авторы</option>
        <option value="system">Системные</option>
        ${state.users.map(usr => `<option value="${usr.id}" ${authorId===usr.id?'selected':''}>${escapeHtml(usr.display_name)}</option>`).join('')}
      </select>` : ''}
    </div>
    <div id="i-list"></div>`;
    main.querySelector('#i-q').oninput = (e) => { q = e.target.value; loadList(); };
    main.querySelector('#i-cat').onchange = (e) => { category = e.target.value; loadList(); };
    if (u && u.role === 'admin') main.querySelector('#i-author').onchange = (e) => { authorId = e.target.value; loadList(); };
    const ab = main.querySelector('#add-btn');
    if (ab) ab.onclick = () => openIngredientForm();
    loadList();
  };
  async function loadList() {
    const area = main.querySelector('#i-list');
    area.innerHTML = `<div class="skeleton" style="height:200px"></div>`;
    try {
      const list = await fakeApi.getIngredients({ q, category, authorId });
      if (!list.length) {
        area.innerHTML = `<div class="state"><div class="state-eyebrow">Не найдено</div><p class="t-small">Попробуйте изменить фильтры.</p></div>`;
        return;
      }
      const groups = {};
      list.forEach(i => { (groups[i.category] = groups[i.category] || []).push(i); });
      area.innerHTML = `<div class="shopping-table">${Object.keys(groups).map(cat => `
        <div class="shopping-group-head">${escapeHtml(cat)}</div>
        ${groups[cat].map(i => `<div class="shopping-row">
          <div style="display:flex;flex-direction:column;gap:2px">
            <span style="color:var(--fg-primary)">${escapeHtml(i.title)}${i.is_system ? '' : ` <span class="tag tag-accent">пользовательский</span>`}</span>
            <span class="t-micro">по умолч.: ${i.default_amount} ${escapeHtml(i.unit)}${!i.is_system && i.author_id ? ' · ' + escapeHtml(state.users.find(u => u.id === i.author_id)?.display_name || '') : ''}</span>
          </div>
          <div style="display:flex;gap:6px;justify-self:end">
            ${canEditIng(i) ? `<button class="btn-icon-sm" data-edit="${i.id}" title="Редактировать">${ICONS.edit}</button>` : ''}
            ${canDeleteIng(i) ? `<button class="btn-icon-sm is-danger" data-del="${i.id}" title="Удалить">${ICONS.trash}</button>` : ''}
          </div>
          <span></span>
        </div>`).join('')}
      `).join('')}</div>`;
      area.querySelectorAll('[data-edit]').forEach(b => b.onclick = () => openIngredientForm(b.dataset.edit));
      area.querySelectorAll('[data-del]').forEach(b => b.onclick = () => deleteIng(b.dataset.del));
    } catch (e) { handleApiError(e); }
  }
  function canEditIng(i) {
    if (!u) return false;
    if (i.is_system) return u.role === 'admin';
    return i.author_id === u.id || u.role === 'admin';
  }
  function canDeleteIng(i) { return canEditIng(i); }
  function openIngredientForm(id) {
    const existing = id ? state.ingredients.find(x => x.id === id) : null;
    const draft = existing ? { ...existing } : { title: '', unit: 'г', default_amount: 100, category: 'Овощи', is_system: false };
    openModal(`<div class="modal-head"><h2>${existing ? 'Редактировать' : 'Новый'} ингредиент</h2><button class="modal-close" onclick="closeModal()">${ICONS.x}</button></div>
      <form id="ing-form" class="modal-body">
        <div class="field"><label>Название</label><input class="input" name="title" required minlength="2" maxlength="200" value="${escapeHtml(draft.title)}" /></div>
        <div class="field-row">
          <div class="field"><label>Единица</label><input class="input" name="unit" required maxlength="20" value="${escapeHtml(draft.unit)}" /></div>
          <div class="field"><label>Дефолт. кол-во</label><input class="input" type="number" step="0.01" min="0.01" max="100000" name="default_amount" required value="${draft.default_amount}" /></div>
        </div>
        <div class="field"><label>Категория</label><select class="select" name="category">${INGREDIENT_CATEGORIES.map(c => `<option ${c===draft.category?'selected':''}>${c}</option>`).join('')}</select></div>
        ${u && u.role === 'admin' ? `<label class="checkbox"><input type="checkbox" name="is_system" ${draft.is_system?'checked':''}/> Системный</label>` : ''}
        <div class="form-actions"><button type="button" class="btn btn-ghost" onclick="closeModal()">Отмена</button><button type="submit" class="btn btn-primary">${existing ? 'Сохранить' : 'Создать'}</button></div>
      </form>`);
    document.getElementById('ing-form').onsubmit = async (e) => {
      e.preventDefault();
      const fd = new FormData(e.target);
      const payload = {
        title: fd.get('title').trim(), unit: fd.get('unit').trim(),
        default_amount: parseFloat(fd.get('default_amount')),
        category: fd.get('category'), is_system: fd.get('is_system') === 'on'
      };
      try {
        if (existing) await fakeApi.updateIngredient(existing.id, payload);
        else await fakeApi.createIngredient(payload);
        closeModal(); toast('Сохранено', 'success'); loadList();
      } catch (err) { handleApiError(err); }
    };
  }
  async function deleteIng(id) {
    const i = state.ingredients.find(x => x.id === id);
    openModal(`<div class="modal-head"><h2>Удалить «${escapeHtml(i.title)}»?</h2><button class="modal-close" onclick="closeModal()">${ICONS.x}</button></div>
      <p class="t-small">Удалить ингредиент можно только если он не используется в рецептах.</p>
      <div class="form-actions"><button class="btn btn-ghost" onclick="closeModal()">Отмена</button><button class="btn btn-danger" id="ok">Удалить</button></div>`);
    document.getElementById('ok').onclick = async () => {
      try { await fakeApi.deleteIngredient(id); closeModal(); toast('Удалено', 'success'); loadList(); }
      catch (e) { handleApiError(e); }
    };
  }
  render();
};

  const u = currentUser();
  if (!u || u.role !== 'admin') { toast('Только для администратора', 'error'); go('#/recipes'); return; }
  const render = () => {
    const groups = {};
    state.categories.forEach(c => { (groups[c.type] = groups[c.type] || []).push(c); });
    main.innerHTML = `<div class="page-heading">
      <h1>Категории рецептов</h1>
      <button class="btn btn-primary btn-sm" id="add-cat">${ICONS.plus}<span>Новая категория</span></button>
    </div>
    ${Object.keys(CATEGORY_TYPES).map(t => `
      <div class="card card-pad-lg" style="margin-bottom:16px">
        <h3 class="t-subheading" style="margin-bottom:14px">${CATEGORY_TYPES[t]}</h3>
        <div style="display:flex;flex-wrap:wrap;gap:8px">
          ${(groups[t] || []).map(c => `<span class="tag" style="font-size:13px;padding:6px 12px">
            <span>${escapeHtml(c.name)}</span>
            <button class="btn-icon" style="width:20px;height:20px;background:transparent;box-shadow:none" data-edit="${c.id}">${ICONS.edit}</button>
            <button class="btn-icon" style="width:20px;height:20px;background:transparent;box-shadow:none" data-del="${c.id}">${ICONS.x}</button>
          </span>`).join('') || '<p class="t-small">Категорий нет.</p>'}
        </div>
      </div>`).join('')}`;
    main.querySelector('#add-cat').onclick = () => openCatForm();
    main.querySelectorAll('[data-edit]').forEach(b => b.onclick = () => openCatForm(b.dataset.edit));
    main.querySelectorAll('[data-del]').forEach(b => b.onclick = () => deleteCat(b.dataset.del));
  };
  function openCatForm(id) {
    const existing = id ? state.categories.find(c => c.id === id) : null;
    const draft = existing ? { ...existing } : { name: '', description: '', type: 'meal_role' };
    openModal(`<div class="modal-head"><h2>${existing?'Редактировать':'Новая'} категория</h2><button class="modal-close" onclick="closeModal()">${ICONS.x}</button></div>
      <form id="cat-form" class="modal-body">
        <div class="field"><label>Название</label><input class="input" name="name" required value="${escapeHtml(draft.name)}" /></div>
        <div class="field"><label>Тип</label><select class="select" name="type" ${existing?'disabled':''}>${Object.entries(CATEGORY_TYPES).map(([k,v]) => `<option value="${k}" ${k===draft.type?'selected':''}>${v}</option>`).join('')}</select></div>
        <div class="field"><label>Описание</label><textarea class="textarea" name="description">${escapeHtml(draft.description||'')}</textarea></div>
        <div class="form-actions"><button type="button" class="btn btn-ghost" onclick="closeModal()">Отмена</button><button type="submit" class="btn btn-primary">Сохранить</button></div>
      </form>`);
    document.getElementById('cat-form').onsubmit = async (e) => {
      e.preventDefault();
      const fd = new FormData(e.target);
      const payload = { name: fd.get('name').trim(), description: fd.get('description').trim(), type: fd.get('type') };
      try { if (existing) await fakeApi.updateCategory(existing.id, payload); else await fakeApi.createCategory(payload); closeModal(); toast('Сохранено', 'success'); render(); }
      catch (err) { handleApiError(err); }
    };
  }
  function deleteCat(id) {
    const c = state.categories.find(x => x.id === id);
    openModal(`<div class="modal-head"><h2>Удалить «${escapeHtml(c.name)}»?</h2><button class="modal-close" onclick="closeModal()">${ICONS.x}</button></div>
      <p class="t-small">Удалить можно только если категория не используется в рецептах.</p>
      <div class="form-actions"><button class="btn btn-ghost" onclick="closeModal()">Отмена</button><button class="btn btn-danger" id="ok">Удалить</button></div>`);
    document.getElementById('ok').onclick = async () => {
      try { await fakeApi.deleteCategory(id); closeModal(); toast('Удалено', 'success'); render(); }
      catch (e) { handleApiError(e); }
    };
  }
  render();
};

/* ---- DASHBOARD ----------------------------------------- */
const chartInstances = [];
views.dashboard = async (main) => {
  chartInstances.forEach(c => c.destroy && c.destroy()); chartInstances.length = 0;
  const u = currentUser();
  main.innerHTML = `<div class="page-heading">
    <h1>Статистика <span class="t-gradient">проекта</span></h1>
  </div>
  <div id="dash-area"><div class="skeleton" style="height:120px;margin-bottom:16px"></div><div class="skeleton" style="height:300px"></div></div>`;
  let stats;
  try { stats = await fakeApi.getDashboardStats(); } catch (e) { handleApiError(e); return; }
  const area = main.querySelector('#dash-area');

  const kpis = [{ label: 'Всего рецептов', value: stats.totalRecipes }];
  if (u) {
    kpis.push({ label: 'Мои рецепты', value: stats.myRecipes });
    kpis.push({ label: 'Мои комментарии', value: stats.myComments });
  }
  if (u && u.role === 'admin') {
    kpis.push({ label: 'Пользователей', value: stats.totalUsers });
    kpis.push({ label: 'Всего комментариев', value: stats.totalComments });
  }

  area.innerHTML = `
    <div class="kpi-grid">${kpis.map(k => `<div class="kpi"><span class="label">${k.label}</span><span class="value">${k.value}</span></div>`).join('')}</div>
    <div class="dash-grid">
      <div class="dash-block">
        <h3>Топ-10 по рейтингу</h3>
        <div class="top-list">${stats.top10.map((r, i) => `<div class="top-list-row"><span class="rank">#${i+1}</span><a class="name" href="#/recipes/${r.id}">${escapeHtml(r.title)}</a><span class="val">${ICONS.star}${r.rating.toFixed(1)}</span></div>`).join('') || '<p class="t-small">Пока нет данных</p>'}</div>
      </div>
      ${u ? `<div class="dash-block">
        <h3>Топ-10 из избранного</h3>
        <div class="top-list">${stats.topFav.length ? stats.topFav.map((r, i) => `<div class="top-list-row"><span class="rank">#${i+1}</span><a class="name" href="#/recipes/${r.id}">${escapeHtml(r.title)}</a><span class="val">${ICONS.star}${r.rating.toFixed(1)}</span></div>`).join('') : '<p class="t-small">В избранном ещё ничего нет.</p>'}</div>
      </div>` : ''}
      <div class="dash-block">
        <h3>По основному ингредиенту</h3>
        <div class="dash-chart"><canvas id="chart-main"></canvas></div>
      </div>
      <div class="dash-block">
        <h3>По национальной кухне</h3>
        <div class="dash-chart"><canvas id="chart-cuisine"></canvas></div>
      </div>
      ${u ? `<div class="dash-block">
        <h3>Заполненность плана меню</h3>
        <div class="mini-week-grid">${DAY_LABELS.map((d, di) => `<div class="mini-week-day">
          <span class="day-label">${d}</span>
          ${MEAL_KEYS.map(m => `<div class="mini-slot ${stats.planFill[`${di}_${m}`] ? 'is-filled' : ''}" title="${MEAL_LABELS[m]}"></div>`).join('')}
        </div>`).join('')}</div>
        <p class="t-micro">Фиолетовая плитка — слот заполнен.</p>
      </div>` : ''}
      ${u && u.role === 'admin' ? `<div class="dash-block">
        <h3>Топ-10 пользователей по рейтингам</h3>
        <div class="top-list">${stats.topUsersByRating.map((r, i) => `<div class="top-list-row"><span class="rank">#${i+1}</span><span class="name">${escapeHtml(r.name)}</span><span class="val">${r.count}</span></div>`).join('') || '<p class="t-small">Пока нет данных</p>'}</div>
      </div>
      <div class="dash-block">
        <h3>Топ-10 пользователей по комментариям</h3>
        <div class="top-list">${stats.topUsersByComments.map((r, i) => `<div class="top-list-row"><span class="rank">#${i+1}</span><span class="name">${escapeHtml(r.name)}</span><span class="val">${r.count}</span></div>`).join('') || '<p class="t-small">Пока нет данных</p>'}</div>
      </div>` : ''}
    </div>`;

  const chartCommon = {
    type: 'bar',
    options: {
      responsive: true, maintainAspectRatio: false,
      plugins: { legend: { display: false }, tooltip: { backgroundColor: '#17181c', titleColor: '#fff', bodyColor: '#d4d4d4', borderColor: 'rgba(255,255,255,0.06)', borderWidth: 1 } },
      scales: {
        x: { ticks: { color: '#a9a9ac', font: { size: 11 } }, grid: { display: false } },
        y: { ticks: { color: '#a9a9ac', font: { size: 11 } }, grid: { color: 'rgba(255,255,255,0.06)' }, beginAtZero: true, precision: 0 }
      }
    }
  };
  const makeChart = (canvasId, data) => {
    if (typeof Chart === 'undefined') return;
    const ctx = document.getElementById(canvasId);
    if (!ctx) return;
    const grad = ctx.getContext('2d').createLinearGradient(0, 0, 0, 240);
    grad.addColorStop(0, '#a279e6'); grad.addColorStop(1, '#7d79e7');
    chartInstances.push(new Chart(ctx, {
      ...chartCommon,
      data: { labels: data.map(d => d[0]), datasets: [{ data: data.map(d => d[1]), backgroundColor: grad, borderRadius: 6, maxBarThickness: 28 }] }
    }));
  };
  setTimeout(() => { makeChart('chart-main', stats.byMainIng); makeChart('chart-cuisine', stats.byCuisine); }, 80);
};
