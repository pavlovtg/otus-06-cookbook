openapi: 3.0.0
info:
  title: Recipes API
  version: 1.0.0
  description: API сервиса рецептов (bounded context cookbook)
paths:
  /api/v1/recipes:
    get:
      summary: Получить список рецептов
      operationId: getRecipes
      tags:
        - Recipes
      parameters:
        - name: page
          in: query
          required: false
          schema:
            type: integer
            minimum: 1
            default: 1
          description: Номер страницы (начиная с 1)
        - name: pageSize
          in: query
          required: false
          schema:
            type: integer
            minimum: 1
            maximum: 1000
            default: 18
          description: Размер страницы (максимум 1000; если передано больше — используется 1000)
        - name: q
          in: query
          required: false
          schema:
            type: string
            maxLength: 300
          description: Поисковый запрос (по title, description, категориям, ингредиентам; AND-логика по словам; максимум 300 символов)
        - name: sort
          in: query
          required: false
          schema:
            type: string
            enum: [title_asc, title_desc]
            default: title_asc
          description: Порядок сортировки по названию
      responses:
        "200":
          description: Постраничный список рецептов
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PagedResultRecipeShortDto"
        "500":
          description: Внутренняя ошибка сервера
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ProblemDetails"
    post:
      summary: Создать рецепт
      operationId: createRecipe
      tags:
        - Recipes
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RecipeRequest"
      responses:
        "201":
          description: Рецепт создан
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RecipeDto"
        "400":
          description: Ошибка валидации
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ProblemDetails"
        "500":
          description: Внутренняя ошибка сервера
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ProblemDetails"
  /api/v1/recipes/{id}/photo:
    post:
      summary: Загрузить фото рецепта
      operationId: uploadRecipePhoto
      tags:
        - Photos
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required:
                - file
              properties:
                file:
                  type: string
                  format: binary
                  description: Файл изображения (image/jpeg или image/png, максимум 10 МБ)
      responses:
        "200":
          description: Фото загружено
          content:
            application/json:
              schema:
                type: object
                required:
                  - photoId
                properties:
                  photoId:
                    type: string
                    format: uuid
                    description: Идентификатор загруженного фото
        "400":
          description: Недопустимый формат или размер файла, некорректный идентификатор или рецепт не найден
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ProblemDetails"
        "500":
          description: Внутренняя ошибка сервера
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ProblemDetails"
    delete:
      summary: Удалить фото рецепта
      operationId: deleteRecipePhoto
      tags:
        - Photos
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "204":
          description: Фото удалено
        "400":
          description: Некорректный идентификатор или рецепт не найден
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ProblemDetails"
        "500":
          description: Внутренняя ошибка сервера
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ProblemDetails"
  /api/v1/photos/{photoId}:
    get:
      summary: Получить оригинал фото
      operationId: getPhoto
      tags:
        - Photos
      parameters:
        - name: photoId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Оригинал фото
          headers:
            Cache-Control:
              schema:
                type: string
                example: public, max-age=86400
          content:
            image/jpeg:
              schema:
                type: string
                format: binary
            image/png:
              schema:
                type: string
                format: binary
        "400":
          description: Некорректный идентификатор или фото не найдено
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ProblemDetails"
        "500":
          description: Внутренняя ошибка сервера
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ProblemDetails"
  /api/v1/photos/{photoId}/thumbnail:
    get:
      summary: Получить thumbnail фото
      operationId: getPhotoThumbnail
      tags:
        - Photos
      parameters:
        - name: photoId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Thumbnail фото (400×300 px)
          headers:
            Cache-Control:
              schema:
                type: string
                example: public, max-age=86400
          content:
            image/jpeg:
              schema:
                type: string
                format: binary
        "400":
          description: Некорректный идентификатор или фото не найдено
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ProblemDetails"
        "500":
          description: Внутренняя ошибка сервера
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ProblemDetails"
  /api/v1/recipes/{id}:
    get:
      summary: Получить рецепт по идентификатору
      operationId: getRecipeById
      tags:
        - Recipes
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Рецепт найден
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RecipeDto"
        "400":
          description: Некорректный идентификатор или рецепт не найден
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ProblemDetails"
        "500":
          description: Внутренняя ошибка сервера
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ProblemDetails"
    put:
      summary: Обновить рецепт
      operationId: updateRecipe
      tags:
        - Recipes
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RecipeRequest"
      responses:
        "204":
          description: Рецепт обновлён
        "400":
          description: Ошибка валидации, некорректный идентификатор или рецепт не найден
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ProblemDetails"
        "500":
          description: Внутренняя ошибка сервера
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ProblemDetails"
    delete:
      summary: Удалить рецепт
      operationId: deleteRecipe
      tags:
        - Recipes
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "204":
          description: Рецепт удалён
        "400":
          description: Некорректный идентификатор или рецепт не найден
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ProblemDetails"
        "500":
          description: Внутренняя ошибка сервера
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ProblemDetails"
  /api/v1/categories:
    get:
      summary: Получить список категорий
      operationId: getCategories
      tags:
        - Categories
      responses:
        "200":
          description: Список категорий
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/CategoryDto"
        "500":
          description: Внутренняя ошибка сервера
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ProblemDetails"
    post:
      summary: Создать категорию
      operationId: createCategory
      tags:
        - Categories
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CategoryRequest"
      responses:
        "201":
          description: Категория создана
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CategoryDto"
        "400":
          description: Ошибка валидации или превышен лимит категорий
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ProblemDetails"
        "500":
          description: Внутренняя ошибка сервера
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ProblemDetails"
  /api/v1/categories/{id}:
    put:
      summary: Обновить категорию
      operationId: updateCategory
      tags:
        - Categories
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CategoryRequest"
      responses:
        "204":
          description: Категория обновлена
        "400":
          description: Ошибка валидации или категория не найдена
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ProblemDetails"
        "500":
          description: Внутренняя ошибка сервера
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ProblemDetails"
    delete:
      summary: Удалить категорию
      operationId: deleteCategory
      tags:
        - Categories
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "204":
          description: Категория удалена
        "400":
          description: Категория не найдена или используется в рецептах
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ProblemDetails"
        "500":
          description: Внутренняя ошибка сервера
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ProblemDetails"
  /api/v1/ingredients:
    get:
      summary: Получить список ингредиентов
      operationId: getIngredients
      tags:
        - Ingredients
      parameters:
        - name: title
          in: query
          required: false
          schema:
            type: string
            maxLength: 200
          description: Фильтр по названию (вхождение, без учёта регистра)
        - name: category
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/IngredientCategory"
          description: Фильтр по категории
        - name: page
          in: query
          required: false
          schema:
            type: integer
            minimum: 1
            default: 1
          description: Номер страницы (начиная с 1)
        - name: pageSize
          in: query
          required: false
          schema:
            type: integer
            minimum: 1
            maximum: 1000
            default: 100
          description: Размер страницы (максимум 1000; если передано больше — используется 1000)
      responses:
        "200":
          description: Постраничный список ингредиентов
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PagedResultIngredientDto"
        "400":
          description: Некорректное значение параметра (например, неизвестная категория, page < 1, pageSize < 1, title > 200 символов)
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ProblemDetails"
        "500":
          description: Внутренняя ошибка сервера
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ProblemDetails"
    post:
      summary: Создать ингредиент
      operationId: createIngredient
      tags:
        - Ingredients
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/IngredientRequest"
      responses:
        "201":
          description: Ингредиент создан
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/IngredientDto"
        "400":
          description: Ошибка валидации
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ProblemDetails"
        "500":
          description: Внутренняя ошибка сервера
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ProblemDetails"
  /api/v1/ingredients/{id}:
    get:
      summary: Получить ингредиент по идентификатору
      operationId: getIngredientById
      tags:
        - Ingredients
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Ингредиент найден
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/IngredientDto"
        "400":
          description: Некорректный идентификатор или ингредиент не найден
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ProblemDetails"
        "500":
          description: Внутренняя ошибка сервера
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ProblemDetails"
    put:
      summary: Обновить ингредиент
      operationId: updateIngredient
      tags:
        - Ingredients
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/IngredientRequest"
      responses:
        "204":
          description: Ингредиент обновлён
        "400":
          description: Ошибка валидации, некорректный идентификатор или ингредиент не найден
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ProblemDetails"
        "500":
          description: Внутренняя ошибка сервера
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ProblemDetails"
    delete:
      summary: Удалить ингредиент
      operationId: deleteIngredient
      tags:
        - Ingredients
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "204":
          description: Ингредиент удалён
        "400":
          description: Некорректный идентификатор или ингредиент не найден
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ProblemDetails"
        "500":
          description: Внутренняя ошибка сервера
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ProblemDetails"
components:
  schemas:
    Difficulty:
      type: string
      enum:
        - easy
        - everyday
        - festive
        - restaurant
        - signature
      example: everyday
    RecipeShortDto:
      type: object
      required:
        - id
        - title
        - description
        - cookingTime
        - difficulty
        - photoId
        - categoryIds
      properties:
        id:
          type: string
          format: uuid
          example: aad1f839-df31-49f2-84d7-4dd01e04be77
        title:
          type: string
          example: Борщ
        description:
          type: string
          example: Классический украинский борщ со свёклой и капустой
        cookingTime:
          type: integer
          description: Время приготовления в минутах
          minimum: 1
          maximum: 9999
          example: 90
        difficulty:
          $ref: "#/components/schemas/Difficulty"
        photoId:
          type: string
          format: uuid
          nullable: true
          description: Идентификатор фото рецепта (null если фото нет)
          example: null
        categoryIds:
          type: array
          items:
            type: string
            format: uuid
          description: Идентификаторы категорий рецепта
          example: ["33333333-0000-0000-0000-000000000001"]
    RecipeIngredientDto:
      type: object
      required:
        - ingredientId
        - title
        - amount
        - unit
      properties:
        ingredientId:
          type: string
          format: uuid
          example: 22222222-0000-0000-0000-000000000001
        title:
          type: string
          example: Морковь
        amount:
          type: number
          format: double
          minimum: 0.001
          maximum: 100000
          example: 150
        unit:
          type: string
          example: г
    RecipeIngredientRequest:
      type: object
      required:
        - ingredientId
        - amount
      properties:
        ingredientId:
          type: string
          format: uuid
          example: 22222222-0000-0000-0000-000000000001
        amount:
          type: number
          format: double
          minimum: 0.001
          maximum: 100000
          example: 150
    RecipeDto:
      type: object
      required:
        - id
        - title
        - description
        - cookingTime
        - difficulty
        - servings
        - instructions
        - ingredients
        - photoId
        - categoryIds
      properties:
        id:
          type: string
          format: uuid
          example: aad1f839-df31-49f2-84d7-4dd01e04be77
        title:
          type: string
          example: Борщ
        description:
          type: string
          example: Классический украинский борщ со свёклой и капустой
        cookingTime:
          type: integer
          description: Время приготовления в минутах
          minimum: 1
          maximum: 9999
          example: 90
        difficulty:
          $ref: "#/components/schemas/Difficulty"
        servings:
          type: integer
          description: Количество порций
          minimum: 1
          maximum: 99
          example: 6
        instructions:
          type: string
          description: Пошаговые инструкции приготовления
          example: "Сварить бульон. Добавить овощи. Подавать со сметаной."
        ingredients:
          type: array
          items:
            $ref: "#/components/schemas/RecipeIngredientDto"
        photoId:
          type: string
          format: uuid
          nullable: true
          description: Идентификатор фото рецепта (null если фото нет)
          example: null
        categoryIds:
          type: array
          items:
            type: string
            format: uuid
          description: Идентификаторы категорий рецепта
          example: ["33333333-0000-0000-0000-000000000001"]
    RecipeRequest:
      type: object
      required:
        - title
        - cookingTime
        - difficulty
        - servings
        - instructions
        - ingredients
        - categoryIds
      properties:
        title:
          type: string
          minLength: 1
          maxLength: 200
          example: Борщ
        description:
          type: string
          maxLength: 2000
          example: Классический украинский борщ со свёклой и капустой
        cookingTime:
          type: integer
          description: Время приготовления в минутах
          minimum: 1
          maximum: 9999
          example: 90
        difficulty:
          $ref: "#/components/schemas/Difficulty"
        servings:
          type: integer
          description: Количество порций
          minimum: 1
          maximum: 99
          example: 6
        instructions:
          type: string
          maxLength: 10000
          description: Пошаговые инструкции приготовления
          example: "Сварить бульон. Добавить овощи. Подавать со сметаной."
        ingredients:
          type: array
          items:
            $ref: "#/components/schemas/RecipeIngredientRequest"
        categoryIds:
          type: array
          items:
            type: string
            format: uuid
          description: Идентификаторы категорий рецепта
          example: ["33333333-0000-0000-0000-000000000001"]
    ProblemDetails:
      description: RFC 7807 Problem Details
      type: object
      required:
        - type
        - title
        - status
        - detail
        - instance
      properties:
        type:
          type: string
          description: URI-ссылка, идентифицирующая тип проблемы
          example: about:blank
        title:
          type: string
          description: Краткое человекочитаемое описание типа проблемы
          example: Internal Server Error
        status:
          type: integer
          description: HTTP-статус код
          example: 500
        detail:
          type: string
          description: Детальное описание конкретного возникшего экземпляра проблемы
          example: An unexpected error occurred
        instance:
          type: string
          description: URI-ссылка, идентифицирующая конкретный экземпляр проблемы
          example: /api/v1/recipes
    IngredientCategory:
      type: string
      enum:
        - vegetables
        - fruits_and_berries
        - meat_and_poultry
        - fish_and_seafood
        - dairy_and_eggs
        - grains_and_cereals
        - legumes
        - nuts_and_seeds
        - oils_and_fats
        - spices_and_seasonings
        - sauces_and_pastes
        - bakery_and_sweets
        - other
      example: vegetables
    IngredientDto:
      type: object
      required:
        - id
        - title
        - unit
        - defaultAmount
        - category
        - isSystem
      properties:
        id:
          type: string
          format: uuid
          example: aad1f839-df31-49f2-84d7-4dd01e04be77
        title:
          type: string
          example: Морковь
        unit:
          type: string
          example: г
        defaultAmount:
          type: number
          format: double
          minimum: 0.001
          maximum: 100000
          example: 100
        category:
          $ref: "#/components/schemas/IngredientCategory"
        isSystem:
          type: boolean
          example: true
    PagedResultRecipeShortDto:
      type: object
      required:
        - items
        - total
        - page
        - pageSize
      properties:
        items:
          type: array
          items:
            $ref: "#/components/schemas/RecipeShortDto"
        total:
          type: integer
          description: Общее количество рецептов
          example: 42
        page:
          type: integer
          description: Текущая страница
          example: 1
        pageSize:
          type: integer
          description: Размер страницы
          example: 18
    PagedResultIngredientDto:
      type: object
      required:
