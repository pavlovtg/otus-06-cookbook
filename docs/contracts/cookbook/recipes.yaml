openapi: 3.0.0
info:
  title: Recipes API
  version: 1.0.0
  description: API сервиса рецептов (bounded context cookbook)
paths:
  /api/v1/recipes:
    get:
      summary: Получить список рецептов
      operationId: getRecipes
      tags:
        - Recipes
      responses:
        "200":
          description: Список рецептов
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/RecipeShortDto"
        "500":
          description: Внутренняя ошибка сервера
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ProblemDetails"
    post:
      summary: Создать рецепт
      operationId: createRecipe
      tags:
        - Recipes
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RecipeRequest"
      responses:
        "201":
          description: Рецепт создан
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RecipeDto"
        "400":
          description: Ошибка валидации
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ProblemDetails"
        "500":
          description: Внутренняя ошибка сервера
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ProblemDetails"
  /api/v1/recipes/{id}:
    get:
      summary: Получить рецепт по идентификатору
      operationId: getRecipeById
      tags:
        - Recipes
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Рецепт найден
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RecipeDto"
        "400":
          description: Некорректный идентификатор или рецепт не найден
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ProblemDetails"
        "500":
          description: Внутренняя ошибка сервера
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ProblemDetails"
    put:
      summary: Обновить рецепт
      operationId: updateRecipe
      tags:
        - Recipes
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RecipeRequest"
      responses:
        "204":
          description: Рецепт обновлён
        "400":
          description: Ошибка валидации, некорректный идентификатор или рецепт не найден
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ProblemDetails"
        "500":
          description: Внутренняя ошибка сервера
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ProblemDetails"
    delete:
      summary: Удалить рецепт
      operationId: deleteRecipe
      tags:
        - Recipes
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "204":
          description: Рецепт удалён
        "400":
          description: Некорректный идентификатор или рецепт не найден
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ProblemDetails"
        "500":
          description: Внутренняя ошибка сервера
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ProblemDetails"
  /api/v1/ingredients:
    get:
      summary: Получить список ингредиентов
      operationId: getIngredients
      tags:
        - Ingredients
      parameters:
        - name: title
          in: query
          required: false
          schema:
            type: string
            maxLength: 200
          description: Фильтр по названию (вхождение, без учёта регистра)
        - name: category
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/IngredientCategory"
          description: Фильтр по категории
        - name: page
          in: query
          required: false
          schema:
            type: integer
            minimum: 1
            default: 1
          description: Номер страницы (начиная с 1)
        - name: pageSize
          in: query
          required: false
          schema:
            type: integer
            minimum: 1
            maximum: 1000
            default: 100
          description: Размер страницы (максимум 1000; если передано больше — используется 1000)
      responses:
        "200":
          description: Постраничный список ингредиентов
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PagedResultIngredientDto"
        "400":
          description: Некорректное значение параметра (например, неизвестная категория, page < 1, pageSize < 1, title > 200 символов)
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ProblemDetails"
        "500":
          description: Внутренняя ошибка сервера
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ProblemDetails"
    post:
      summary: Создать ингредиент
      operationId: createIngredient
      tags:
        - Ingredients
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/IngredientRequest"
      responses:
        "201":
          description: Ингредиент создан
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/IngredientDto"
        "400":
          description: Ошибка валидации
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ProblemDetails"
        "500":
          description: Внутренняя ошибка сервера
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ProblemDetails"
  /api/v1/ingredients/{id}:
    get:
      summary: Получить ингредиент по идентификатору
      operationId: getIngredientById
      tags:
        - Ingredients
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Ингредиент найден
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/IngredientDto"
        "400":
          description: Некорректный идентификатор или ингредиент не найден
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ProblemDetails"
        "500":
          description: Внутренняя ошибка сервера
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ProblemDetails"
    put:
      summary: Обновить ингредиент
      operationId: updateIngredient
      tags:
        - Ingredients
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/IngredientRequest"
      responses:
        "204":
          description: Ингредиент обновлён
        "400":
          description: Ошибка валидации, некорректный идентификатор или ингредиент не найден
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ProblemDetails"
        "500":
          description: Внутренняя ошибка сервера
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ProblemDetails"
    delete:
      summary: Удалить ингредиент
      operationId: deleteIngredient
      tags:
        - Ingredients
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "204":
          description: Ингредиент удалён
        "400":
          description: Некорректный идентификатор или ингредиент не найден
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ProblemDetails"
        "500":
          description: Внутренняя ошибка сервера
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ProblemDetails"
components:
  schemas:
    Difficulty:
      type: string
      enum:
        - easy
        - everyday
        - festive
        - restaurant
        - signature
      example: everyday
    RecipeShortDto:
      type: object
      required:
        - id
        - title
        - description
        - cookingTime
        - difficulty
      properties:
        id:
          type: string
          format: uuid
          example: aad1f839-df31-49f2-84d7-4dd01e04be77
        title:
          type: string
          example: Борщ
        description:
          type: string
          example: Классический украинский борщ со свёклой и капустой
        cookingTime:
          type: integer
          description: Время приготовления в минутах
          minimum: 1
          maximum: 9999
          example: 90
        difficulty:
          $ref: "#/components/schemas/Difficulty"
    RecipeIngredientDto:
      type: object
      required:
        - ingredientId
        - title
        - amount
        - unit
      properties:
        ingredientId:
          type: string
          format: uuid
          example: 22222222-0000-0000-0000-000000000001
        title:
          type: string
          example: Морковь
        amount:
          type: number
          format: double
          minimum: 0.001
          maximum: 100000
          example: 150
        unit:
          type: string
          example: г
    RecipeIngredientRequest:
      type: object
      required:
        - ingredientId
        - amount
      properties:
        ingredientId:
          type: string
          format: uuid
          example: 22222222-0000-0000-0000-000000000001
        amount:
          type: number
          format: double
          minimum: 0.001
          maximum: 100000
          example: 150
    RecipeDto:
      type: object
      required:
        - id
        - title
        - description
        - cookingTime
        - difficulty
        - servings
        - instructions
        - ingredients
      properties:
        id:
          type: string
          format: uuid
          example: aad1f839-df31-49f2-84d7-4dd01e04be77
        title:
          type: string
          example: Борщ
        description:
          type: string
          example: Классический украинский борщ со свёклой и капустой
        cookingTime:
          type: integer
          description: Время приготовления в минутах
          minimum: 1
          maximum: 9999
          example: 90
        difficulty:
          $ref: "#/components/schemas/Difficulty"
        servings:
          type: integer
          description: Количество порций
          minimum: 1
          maximum: 99
          example: 6
        instructions:
          type: string
          description: Пошаговые инструкции приготовления
          example: "Сварить бульон. Добавить овощи. Подавать со сметаной."
        ingredients:
          type: array
          items:
            $ref: "#/components/schemas/RecipeIngredientDto"
    RecipeRequest:
      type: object
      required:
        - title
        - cookingTime
        - difficulty
        - servings
        - instructions
        - ingredients
      properties:
        title:
          type: string
          minLength: 1
          maxLength: 200
          example: Борщ
        description:
          type: string
          maxLength: 2000
          example: Классический украинский борщ со свёклой и капустой
        cookingTime:
          type: integer
          description: Время приготовления в минутах
          minimum: 1
          maximum: 9999
          example: 90
        difficulty:
          $ref: "#/components/schemas/Difficulty"
        servings:
          type: integer
          description: Количество порций
          minimum: 1
          maximum: 99
          example: 6
        instructions:
          type: string
          maxLength: 10000
          description: Пошаговые инструкции приготовления
          example: "Сварить бульон. Добавить овощи. Подавать со сметаной."
        ingredients:
          type: array
          items:
            $ref: "#/components/schemas/RecipeIngredientRequest"
    ProblemDetails:
      description: RFC 7807 Problem Details
      type: object
      required:
        - type
        - title
        - status
        - detail
        - instance
      properties:
        type:
          type: string
          description: URI-ссылка, идентифицирующая тип проблемы
          example: about:blank
        title:
          type: string
          description: Краткое человекочитаемое описание типа проблемы
          example: Internal Server Error
        status:
          type: integer
          description: HTTP-статус код
          example: 500
        detail:
          type: string
          description: Детальное описание конкретного возникшего экземпляра проблемы
          example: An unexpected error occurred
        instance:
          type: string
          description: URI-ссылка, идентифицирующая конкретный экземпляр проблемы
          example: /api/v1/recipes
    IngredientCategory:
      type: string
      enum:
        - vegetables
        - fruits_and_berries
        - meat_and_poultry
        - fish_and_seafood
        - dairy_and_eggs
        - grains_and_cereals
        - legumes
        - nuts_and_seeds
        - oils_and_fats
        - spices_and_seasonings
        - sauces_and_pastes
        - bakery_and_sweets
        - other
      example: vegetables
    IngredientDto:
      type: object
      required:
        - id
        - title
        - unit
        - defaultAmount
        - category
        - isSystem
      properties:
        id:
          type: string
          format: uuid
          example: aad1f839-df31-49f2-84d7-4dd01e04be77
        title:
          type: string
          example: Морковь
        unit:
          type: string
          example: г
        defaultAmount:
          type: number
          format: double
          minimum: 0.001
          maximum: 100000
          example: 100
        category:
          $ref: "#/components/schemas/IngredientCategory"
        isSystem:
          type: boolean
          example: true
    PagedResultIngredientDto:
      type: object
      required:
        - items
        - total
        - page
        - pageSize
      properties:
        items:
          type: array
          items:
            $ref: "#/components/schemas/IngredientDto"
        total:
          type: integer
          description: Общее количество ингредиентов, соответствующих фильтрам
          example: 150
        page:
          type: integer
          description: Текущая страница
          example: 1
        pageSize:
          type: integer
          description: Размер страницы
          example: 100
    IngredientRequest:
      type: object
      required:
        - title
        - unit
        - defaultAmount
        - category
      properties:
        title:
          type: string
          minLength: 2
          maxLength: 200
          example: Морковь
        unit:
          type: string
          minLength: 1
          maxLength: 20
          example: г
        defaultAmount:
          type: number
          format: double
          minimum: 0.001
          maximum: 100000
          example: 100
        category:
          $ref: "#/components/schemas/IngredientCategory"
