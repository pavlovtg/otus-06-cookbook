openapi: 3.0.0
info:
  title: Recipes API
  version: 1.0.0
  description: API сервиса рецептов (bounded context cookbook)
paths:
  /api/v1/dashboard:
    get:
      summary: Получить статистику дашборда
      operationId: getDashboardStats
      tags:
        - Dashboard
      security: []
      responses:
        "200":
          description: Статистика дашборда (поля зависят от роли пользователя)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DashboardStatsDto"
        "500":
          description: Внутренняя ошибка сервера
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ProblemDetails"
  /api/v1/recipes:
    get:
      summary: Получить список рецептов
      operationId: getRecipes
      tags:
        - Recipes
      parameters:
        - name: page
          in: query
          required: false
          schema:
            type: integer
            minimum: 1
            default: 1
          description: Номер страницы (начиная с 1)
        - name: pageSize
          in: query
          required: false
          schema:
            type: integer
            minimum: 1
            maximum: 1000
            default: 18
          description: Размер страницы (максимум 1000; если передано больше — используется 1000)
        - name: q
          in: query
          required: false
          schema:
            type: string
            maxLength: 300
          description: Поисковый запрос (по title, description, категориям, ингредиентам; AND-логика по словам; максимум 300 символов)
        - name: sort
          in: query
          required: false
          schema:
            type: string
            enum: [title_asc, title_desc, rating_desc]
            default: title_asc
          description: Порядок сортировки (title_asc — по названию А→Я, title_desc — по названию Я→А, rating_desc — по убыванию средней оценки)
        - name: favorites
          in: query
          required: false
          schema:
            type: boolean
          description: Если true — возвращать только рецепты из избранного текущего пользователя
      responses:
        "200":
          description: Постраничный список рецептов
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PagedResultRecipeShortDto"
        "500":
          description: Внутренняя ошибка сервера
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ProblemDetails"
    post:
      summary: Создать рецепт
      operationId: createRecipe
      tags:
        - Recipes
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RecipeRequest"
      responses:
        "201":
          description: Рецепт создан
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RecipeDto"
        "400":
          description: Ошибка валидации
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ProblemDetails"
        "401":
          description: Не авторизован
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ProblemDetails"
        "500":
          description: Внутренняя ошибка сервера
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ProblemDetails"
  /api/v1/recipes/{id}/rating:
    put:
      summary: Выставить оценку рецепту
      operationId: setRecipeRating
      tags:
        - Recipes
      security:
        - BearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RatingRequest"
      responses:
        "200":
          description: Оценка выставлена, возвращает обновлённый рейтинг
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RatingSummaryDto"
        "400":
          description: Некорректный идентификатор, рецепт не найден или значение оценки вне диапазона 1–5
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ProblemDetails"
        "401":
          description: Не авторизован
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ProblemDetails"
        "500":
          description: Внутренняя ошибка сервера
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ProblemDetails"
    delete:
      summary: Удалить оценку рецепта
      operationId: deleteRecipeRating
      tags:
        - Recipes
      security:
        - BearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "204":
          description: Оценка удалена
        "400":
          description: Некорректный идентификатор, рецепт не найден или оценка не существует
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ProblemDetails"
        "401":
          description: Не авторизован
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ProblemDetails"
        "500":
          description: Внутренняя ошибка сервера
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ProblemDetails"
  /api/v1/recipes/{id}/photo:
    post:
      summary: Загрузить фото рецепта
      operationId: uploadRecipePhoto
      tags:
        - Photos
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required:
                - file
              properties:
                file:
                  type: string
                  format: binary
                  description: Файл изображения (image/jpeg или image/png, максимум 10 МБ)
      responses:
        "200":
          description: Фото загружено
          content:
            application/json:
              schema:
                type: object
                required:
                  - photoId
                properties:
                  photoId:
                    type: string
                    format: uuid
                    description: Идентификатор загруженного фото
        "400":
          description: Недопустимый формат или размер файла, некорректный идентификатор или рецепт не найден
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ProblemDetails"
        "500":
          description: Внутренняя ошибка сервера
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ProblemDetails"
    delete:
      summary: Удалить фото рецепта
      operationId: deleteRecipePhoto
      tags:
        - Photos
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "204":
          description: Фото удалено
        "400":
          description: Некорректный идентификатор или рецепт не найден
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ProblemDetails"
        "500":
          description: Внутренняя ошибка сервера
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ProblemDetails"
  /api/v1/photos/{photoId}:
    get:
      summary: Получить оригинал фото
      operationId: getPhoto
      tags:
        - Photos
      parameters:
        - name: photoId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Оригинал фото
          headers:
            Cache-Control:
              schema:
                type: string
                example: public, max-age=86400
          content:
            image/jpeg:
              schema:
                type: string
                format: binary
            image/png:
              schema:
                type: string
                format: binary
        "400":
          description: Некорректный идентификатор или фото не найдено
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ProblemDetails"
        "500":
          description: Внутренняя ошибка сервера
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ProblemDetails"
  /api/v1/photos/{photoId}/thumbnail:
    get:
      summary: Получить thumbnail фото
      operationId: getPhotoThumbnail
      tags:
        - Photos
      parameters:
        - name: photoId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Thumbnail фото (400×300 px)
          headers:
            Cache-Control:
              schema:
                type: string
                example: public, max-age=86400
          content:
            image/jpeg:
              schema:
                type: string
                format: binary
        "400":
          description: Некорректный идентификатор или фото не найдено
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ProblemDetails"
        "500":
          description: Внутренняя ошибка сервера
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ProblemDetails"
  /api/v1/recipes/{id}/favorites:
    post:
      summary: Добавить рецепт в избранное
      operationId: addFavorite
      tags:
        - Recipes
      security:
        - BearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "201":
          description: Рецепт добавлен в избранное
        "400":
          description: Некорректный идентификатор или рецепт не найден
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ProblemDetails"
        "401":
          description: Не авторизован
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ProblemDetails"
        "500":
          description: Внутренняя ошибка сервера
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ProblemDetails"
    delete:
      summary: Удалить рецепт из избранного
      operationId: removeFavorite
      tags:
        - Recipes
      security:
        - BearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "204":
          description: Рецепт удалён из избранного
        "400":
          description: Некорректный идентификатор или рецепт не найден
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ProblemDetails"
        "401":
          description: Не авторизован
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ProblemDetails"
        "500":
          description: Внутренняя ошибка сервера
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ProblemDetails"
  /api/v1/recipes/{id}/comments:
    get:
      summary: Получить список комментариев к рецепту
      operationId: getRecipeComments
      tags:
        - Recipes
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
        - name: page
          in: query
          required: false
          schema:
            type: integer
            minimum: 1
            default: 1
          description: Номер страницы (начиная с 1)
        - name: pageSize
          in: query
          required: false
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 10
          description: Размер страницы (максимум 100)
      responses:
        "200":
          description: Постраничный список комментариев
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PagedResultCommentDto"
        "400":
          description: Некорректный идентификатор или рецепт не найден
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ProblemDetails"
        "500":
          description: Внутренняя ошибка сервера
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ProblemDetails"
    post:
      summary: Добавить комментарий к рецепту
      operationId: addRecipeComment
      tags:
        - Recipes
      security:
        - BearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CommentRequest"
      responses:
        "201":
          description: Комментарий добавлен
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CommentDto"
        "400":
          description: Ошибка валидации, некорректный идентификатор, рецепт не найден или пользователь уже оставил комментарий
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ProblemDetails"
        "401":
          description: Не авторизован
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ProblemDetails"
        "500":
          description: Внутренняя ошибка сервера
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ProblemDetails"
  /api/v1/recipes/{id}/comments/{commentId}:
    delete:
      summary: Удалить комментарий к рецепту
      operationId: deleteRecipeComment
      tags:
        - Recipes
      security:
        - BearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
        - name: commentId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "204":
          description: Комментарий удалён
        "400":
          description: Некорректный идентификатор, рецепт или комментарий не найден
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ProblemDetails"
        "401":
          description: Не авторизован
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ProblemDetails"
        "403":
          description: Нет прав на удаление комментария
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ProblemDetails"
        "500":
          description: Внутренняя ошибка сервера
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ProblemDetails"
  /api/v1/recipes/{id}:
    get:
      summary: Получить рецепт по идентификатору
      operationId: getRecipeById
      tags:
        - Recipes
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Рецепт найден
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RecipeDto"
        "400":
          description: Некорректный идентификатор или рецепт не найден
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ProblemDetails"
        "403":
          description: Рецепт приватный и принадлежит другому пользователю
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ProblemDetails"
        "500":
          description: Внутренняя ошибка сервера
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ProblemDetails"
    put:
      summary: Обновить рецепт
      operationId: updateRecipe
      tags:
        - Recipes
      security:
        - BearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RecipeRequest"
      responses:
        "204":
          description: Рецепт обновлён
        "400":
          description: Ошибка валидации, некорректный идентификатор или рецепт не найден
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ProblemDetails"
        "401":
          description: Не авторизован
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ProblemDetails"
        "500":
          description: Внутренняя ошибка сервера
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ProblemDetails"
    delete:
      summary: Удалить рецепт
      operationId: deleteRecipe
      tags:
        - Recipes
      security:
        - BearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "204":
          description: Рецепт удалён
        "400":
          description: Некорректный идентификатор или рецепт не найден
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ProblemDetails"
        "401":
          description: Не авторизован
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ProblemDetails"
        "500":
          description: Внутренняя ошибка сервера
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ProblemDetails"
  /api/v1/shopping-list:
    get:
      summary: Получить список покупок текущего пользователя
      operationId: getShoppingList
      tags:
        - ShoppingList
      security:
        - BearerAuth: []
      responses:
        "200":
          description: Список покупок, сгруппированный по категориям ингредиентов
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ShoppingListGroupDto"
        "401":
          description: Не авторизован
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ProblemDetails"
  /api/v1/auth/register:
    post:
      summary: Зарегистрировать нового пользователя
      operationId: register
      tags:
        - Auth
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RegisterRequest"
      responses:
        "201":
          description: Пользователь зарегистрирован и вошёл в систему
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResponse"
        "400":
          description: Ошибка валидации или email уже зарегистрирован
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ProblemDetails"
        "500":
          description: Внутренняя ошибка сервера
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ProblemDetails"
  /api/v1/auth/login:
    post:
      summary: Войти в систему
      operationId: login
      tags:
        - Auth
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginRequest"
      responses:
        "200":
          description: Успешный вход
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResponse"
        "400":
          description: Ошибка валидации
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ProblemDetails"
        "401":
          description: Неверные учётные данные
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ProblemDetails"
        "500":
          description: Внутренняя ошибка сервера
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ProblemDetails"
  /api/v1/auth/logout:
    post:
      summary: Выйти из системы
      operationId: logout
      tags:
        - Auth
      security:
        - BearerAuth: []
      responses:
        "204":
          description: Сессия завершена
        "401":
          description: Не авторизован
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ProblemDetails"
        "500":
          description: Внутренняя ошибка сервера
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ProblemDetails"
  /api/v1/auth/me:
    get:
      summary: Получить профиль текущего пользователя
      operationId: getMe
      tags:
        - Auth
      security:
        - BearerAuth: []
      responses:
        "200":
          description: Профиль пользователя
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserDto"
        "401":
          description: Не авторизован
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ProblemDetails"
        "500":
          description: Внутренняя ошибка сервера
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ProblemDetails"
  /api/v1/categories:
    get:
      summary: Получить список категорий
      operationId: getCategories
      tags:
        - Categories
      responses:
        "200":
          description: Список категорий
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/CategoryDto"
        "500":
          description: Внутренняя ошибка сервера
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ProblemDetails"
    post:
      summary: Создать категорию
      operationId: createCategory
      tags:
        - Categories
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CategoryRequest"
      responses:
        "201":
          description: Категория создана
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CategoryDto"
        "400":
          description: Ошибка валидации или превышен лимит категорий
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ProblemDetails"
        "500":
          description: Внутренняя ошибка сервера
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ProblemDetails"
  /api/v1/categories/{id}:
    put:
      summary: Обновить категорию
      operationId: updateCategory
      tags:
        - Categories
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CategoryRequest"
      responses:
        "204":
          description: Категория обновлена
        "400":
          description: Ошибка валидации или категория не найдена
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ProblemDetails"
        "500":
          description: Внутренняя ошибка сервера
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ProblemDetails"
    delete:
      summary: Удалить категорию
      operationId: deleteCategory
      tags:
        - Categories
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "204":
          description: Категория удалена
        "400":
          description: Категория не найдена или используется в рецептах
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ProblemDetails"
        "500":
          description: Внутренняя ошибка сервера
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ProblemDetails"
  /api/v1/ingredients:
    get:
      summary: Получить список ингредиентов
      operationId: getIngredients
      tags:
        - Ingredients
      parameters:
        - name: title
          in: query
          required: false
          schema:
            type: string
            maxLength: 200
          description: Фильтр по названию (вхождение, без учёта регистра)
        - name: category
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/IngredientCategory"
          description: Фильтр по категории
        - name: page
          in: query
          required: false
          schema:
            type: integer
            minimum: 1
            default: 1
          description: Номер страницы (начиная с 1)
        - name: pageSize
          in: query
          required: false
          schema:
            type: integer
            minimum: 1
            maximum: 1000
            default: 100
          description: Размер страницы (максимум 1000; если передано больше — используется 1000)
      responses:
        "200":
          description: Постраничный список ингредиентов
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PagedResultIngredientDto"
        "400":
          description: Некорректное значение параметра (например, неизвестная категория, page < 1, pageSize < 1, title > 200 символов)
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ProblemDetails"
        "500":
          description: Внутренняя ошибка сервера
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ProblemDetails"
    post:
      summary: Создать ингредиент
      operationId: createIngredient
      tags:
        - Ingredients
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/IngredientRequest"
      responses:
        "201":
          description: Ингредиент создан
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/IngredientDto"
        "400":
          description: Ошибка валидации
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ProblemDetails"
        "500":
          description: Внутренняя ошибка сервера
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ProblemDetails"
  /api/v1/ingredients/{id}:
    get:
      summary: Получить ингредиент по идентификатору
      operationId: getIngredientById
      tags:
        - Ingredients
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Ингредиент найден
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/IngredientDto"
        "400":
          description: Некорректный идентификатор или ингредиент не найден
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ProblemDetails"
        "500":
          description: Внутренняя ошибка сервера
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ProblemDetails"
    put:
      summary: Обновить ингредиент
      operationId: updateIngredient
      tags:
        - Ingredients
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/IngredientRequest"
      responses:
        "204":
          description: Ингредиент обновлён
        "400":
          description: Ошибка валидации, некорректный идентификатор или ингредиент не найден
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ProblemDetails"
        "500":
          description: Внутренняя ошибка сервера
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ProblemDetails"
    delete:
      summary: Удалить ингредиент
      operationId: deleteIngredient
      tags:
        - Ingredients
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "204":
          description: Ингредиент удалён
        "400":
          description: Некорректный идентификатор или ингредиент не найден
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ProblemDetails"
        "500":
          description: Внутренняя ошибка сервера
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ProblemDetails"
  /api/v1/meal-plan:
    get:
      summary: Получить план меню текущего пользователя
      operationId: getMealPlan
      tags:
        - MealPlan
      security:
        - BearerAuth: []
      responses:
        "200":
          description: План меню на неделю (пустые слоты возвращаются с пустым массивом items)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MealPlanDto"
        "401":
          description: Не авторизован
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ProblemDetails"
        "500":
          description: Внутренняя ошибка сервера
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ProblemDetails"
    put:
      summary: Заменить план меню текущего пользователя
      operationId: replaceMealPlan
      tags:
        - MealPlan
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/MealPlanRequest"
      responses:
        "200":
          description: Обновлённый план меню
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MealPlanDto"
        "400":
          description: Ошибка валидации (некорректный recipeId, servings вне диапазона 1–99, неизвестный weekDay или mealType)
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ProblemDetails"
        "401":
          description: Не авторизован
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ProblemDetails"
        "500":
          description: Внутренняя ошибка сервера
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ProblemDetails"
    delete:
      summary: Очистить план меню текущего пользователя
      operationId: clearMealPlan
      tags:
        - MealPlan
      security:
        - BearerAuth: []
      responses:
        "204":
          description: План меню очищен
        "401":
          description: Не авторизован
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ProblemDetails"
        "500":
          description: Внутренняя ошибка сервера
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ProblemDetails"
components:
  schemas:
    Difficulty:
      type: string
      enum:
        - easy
        - everyday
        - festive
        - restaurant
        - signature
      example: everyday
    RecipeShortDto:
      type: object
      required:
        - id
        - title
        - description
        - cookingTime
        - difficulty
        - photoId
        - categoryIds
        - isPublic
      properties:
        id:
          type: string
          format: uuid
          example: aad1f839-df31-49f2-84d7-4dd01e04be77
        title:
          type: string
          example: Борщ
        description:
          type: string
          example: Классический украинский борщ со свёклой и капустой
        cookingTime:
          type: integer
          description: Время приготовления в минутах
          minimum: 1
          maximum: 9999
          example: 90
        difficulty:
          $ref: "#/components/schemas/Difficulty"
        photoId:
          type: string
          format: uuid
          nullable: true
          description: Идентификатор фото рецепта (null если фото нет)
          example: null
        categoryIds:
          type: array
          items:
            type: string
            format: uuid
          description: Идентификаторы категорий рецепта
          example: ["33333333-0000-0000-0000-000000000001"]
        isPublic:
          type: boolean
          description: Публичный ли рецепт
          example: true
        authorName:
          type: string
          nullable: true
          description: Отображаемое имя автора рецепта
          example: Ренат Агзамов
        authorId:
          type: string
          format: uuid
          nullable: true
          description: Идентификатор автора рецепта
          example: null
        isFavorite:
          type: boolean
          nullable: true
          description: Добавлен ли рецепт в избранное текущим пользователем (null если пользователь не авторизован)
          example: true
        averageRating:
          type: number
          format: float
          nullable: true
          description: Средняя оценка рецепта (null если оценок нет)
          example: 4.2
        myRating:
          type: integer
          nullable: true
          minimum: 1
          maximum: 5
          description: Оценка текущего пользователя (null если не авторизован или не оценивал)
          example: 4
    RecipeIngredientDto:
      type: object
      required:
        - ingredientId
        - title
        - amount
        - unit
      properties:
        ingredientId:
          type: string
          format: uuid
          example: 22222222-0000-0000-0000-000000000001
        title:
          type: string
          example: Морковь
        amount:
          type: number
          format: double
          minimum: 0.001
          maximum: 100000
          example: 150
        unit:
          type: string
          example: г
    RecipeIngredientRequest:
      type: object
      required:
        - ingredientId
        - amount
      properties:
        ingredientId:
          type: string
          format: uuid
          example: 22222222-0000-0000-0000-000000000001
        amount:
          type: number
          format: double
          minimum: 0.001
          maximum: 100000
          example: 150
    RecipeDto:
      type: object
      required:
        - id
        - title
        - description
        - cookingTime
        - difficulty
        - servings
        - instructions
        - ingredients
        - photoId
        - categoryIds
        - isPublic
      properties:
        id:
          type: string
          format: uuid
          example: aad1f839-df31-49f2-84d7-4dd01e04be77
        title:
          type: string
          example: Борщ
        description:
          type: string
          example: Классический украинский борщ со свёклой и капустой
        cookingTime:
          type: integer
          description: Время приготовления в минутах
          minimum: 1
          maximum: 9999
          example: 90
        difficulty:
          $ref: "#/components/schemas/Difficulty"
        servings:
          type: integer
          description: Количество порций
          minimum: 1
          maximum: 99
          example: 6
        instructions:
          type: string
          description: Пошаговые инструкции приготовления
          example: "Сварить бульон. Добавить овощи. Подавать со сметаной."
        ingredients:
          type: array
          items:
            $ref: "#/components/schemas/RecipeIngredientDto"
        photoId:
          type: string
          format: uuid
          nullable: true
          description: Идентификатор фото рецепта (null если фото нет)
          example: null
        categoryIds:
          type: array
          items:
            type: string
            format: uuid
          description: Идентификаторы категорий рецепта
          example: ["33333333-0000-0000-0000-000000000001"]
        isPublic:
          type: boolean
          description: Публичный ли рецепт
          example: true
        authorName:
          type: string
          nullable: true
          description: Отображаемое имя автора рецепта
          example: Ренат Агзамов
        authorId:
          type: string
          format: uuid
          nullable: true
          description: Идентификатор автора рецепта
          example: null
        averageRating:
          type: number
          format: float
          nullable: true
          description: Средняя оценка рецепта (null если оценок нет)
          example: 4.2
        myRating:
          type: integer
          nullable: true
          minimum: 1
          maximum: 5
          description: Оценка текущего пользователя (null если не авторизован или не оценивал)
          example: 4
    RecipeRequest:
      type: object
      required:
        - title
        - cookingTime
        - difficulty
        - servings
        - instructions
        - isPublic
        - ingredients
        - categoryIds
      properties:
        title:
          type: string
          minLength: 1
          maxLength: 200
          example: Борщ
        description:
          type: string
          maxLength: 2000
          example: Классический украинский борщ со свёклой и капустой
        cookingTime:
          type: integer
          description: Время приготовления в минутах
          minimum: 1
          maximum: 9999
          example: 90
        difficulty:
          $ref: "#/components/schemas/Difficulty"
        servings:
          type: integer
          description: Количество порций
          minimum: 1
          maximum: 99
          example: 6
        instructions:
          type: string
          maxLength: 10000
          description: Пошаговые инструкции приготовления
          example: "Сварить бульон. Добавить овощи. Подавать со сметаной."
        ingredients:
          type: array
          items:
            $ref: "#/components/schemas/RecipeIngredientRequest"
        isPublic:
          type: boolean
          description: Публичный ли рецепт (true — виден всем, false — только автору)
          example: true
        categoryIds:
          type: array
          items:
            type: string
            format: uuid
          description: Идентификаторы категорий рецепта
          example: ["33333333-0000-0000-0000-000000000001"]
    RatingRequest:
      type: object
      required:
        - value
      properties:
        value:
          type: integer
          minimum: 1
          maximum: 5
          description: Оценка рецепта (от 1 до 5)
          example: 4
    RatingSummaryDto:
      type: object
      properties:
        averageRating:
          type: number
          format: float
          nullable: true
          description: Средняя оценка рецепта (null если оценок нет)
          example: 4.2
        myRating:
          type: integer
          nullable: true
          minimum: 1
          maximum: 5
          description: Оценка текущего пользователя
          example: 4
    ProblemDetails:
      description: RFC 7807 Problem Details
      type: object
      required:
        - type
        - title
        - status
        - detail
        - instance
      properties:
        type:
          type: string
          description: URI-ссылка, идентифицирующая тип проблемы
          example: about:blank
        title:
          type: string
          description: Краткое человекочитаемое описание типа проблемы
          example: Internal Server Error
        status:
          type: integer
          description: HTTP-статус код
          example: 500
        detail:
          type: string
          description: Детальное описание конкретного возникшего экземпляра проблемы
          example: An unexpected error occurred
        instance:
          type: string
          description: URI-ссылка, идентифицирующая конкретный экземпляр проблемы
          example: /api/v1/recipes
    IngredientCategory:
      type: string
      enum:
        - vegetables
        - fruits_and_berries
        - meat_and_poultry
        - fish_and_seafood
        - dairy_and_eggs
        - grains_and_cereals
        - legumes
        - nuts_and_seeds
        - oils_and_fats
        - spices_and_seasonings
        - sauces_and_pastes
        - bakery_and_sweets
        - other
      example: vegetables
    IngredientDto:
      type: object
      required:
        - id
        - title
        - unit
        - defaultAmount
        - category
        - isSystem
      properties:
        id:
          type: string
          format: uuid
          example: aad1f839-df31-49f2-84d7-4dd01e04be77
        title:
          type: string
          example: Морковь
        unit:
          type: string
          example: г
        defaultAmount:
          type: number
          format: double
          minimum: 0.001
          maximum: 100000
          example: 100
        category:
          $ref: "#/components/schemas/IngredientCategory"
        isSystem:
          type: boolean
          example: true
    PagedResultRecipeShortDto:
      type: object
      required:
        - items
        - total
        - page
        - pageSize
      properties:
        items:
          type: array
          items:
            $ref: "#/components/schemas/RecipeShortDto"
        total:
          type: integer
          description: Общее количество рецептов
          example: 42
        page:
          type: integer
          description: Текущая страница
          example: 1
        pageSize:
          type: integer
          description: Размер страницы
          example: 18
    PagedResultIngredientDto:
      type: object
      required:
        - items
        - total
        - page
        - pageSize
      properties:
        items:
          type: array
          items:
            $ref: "#/components/schemas/IngredientDto"
        total:
          type: integer
          description: Общее количество ингредиентов, соответствующих фильтрам
          example: 150
        page:
          type: integer
          description: Текущая страница
          example: 1
        pageSize:
          type: integer
          description: Размер страницы
          example: 100
    IngredientRequest:
      type: object
      required:
        - title
        - unit
        - defaultAmount
        - category
      properties:
        title:
          type: string
          minLength: 2
          maxLength: 200
          example: Морковь
        unit:
          type: string
          minLength: 1
          maxLength: 20
          example: г
        defaultAmount:
          type: number
          format: double
          minimum: 0.001
          maximum: 100000
          example: 100
        category:
          $ref: "#/components/schemas/IngredientCategory"
    CategoryType:
      type: string
      enum:
        - meal_role
        - cooking_method
        - main_ingredient
        - cuisine
        - meal_time
        - dietary
        - serving_form
      example: meal_role
    CategoryDto:
      type: object
      required:
        - id
        - name
        - type
      properties:
        id:
          type: string
          format: uuid
          example: 33333333-0000-0000-0000-000000000001
        name:
          type: string
          example: Завтрак
        description:
          type: string
          nullable: true
          example: Блюда для утреннего приёма пищи
        type:
          $ref: "#/components/schemas/CategoryType"
    CategoryRequest:
      type: object
      required:
        - name
        - type
      properties:
        name:
          type: string
          minLength: 1
          maxLength: 200
          example: Завтрак
        description:
          type: string
          maxLength: 2000
          nullable: true
          example: Блюда для утреннего приёма пищи
        type:
          $ref: "#/components/schemas/CategoryType"
    UserRole:
      type: string
      enum:
        - user
        - admin
      example: user
    UserDto:
      type: object
      required:
        - id
        - email
        - displayName
        - role
      properties:
        id:
          type: string
          format: uuid
          example: 11111111-0000-0000-0000-000000000001
        email:
          type: string
          format: email
          example: user@example.com
        displayName:
          type: string
          example: Иван Иванов
        role:
          $ref: "#/components/schemas/UserRole"
    RegisterRequest:
      type: object
      required:
        - displayName
        - email
        - password
      properties:
        displayName:
          type: string
          minLength: 2
          maxLength: 100
          example: Иван Иванов
        email:
          type: string
          format: email
          example: user@example.com
        password:
          type: string
          minLength: 8
          example: s3cr3tP@ss
    LoginRequest:
      type: object
      required:
        - email
        - password
      properties:
        email:
          type: string
          format: email
          example: user@example.com
        password:
          type: string
          minLength: 1
          example: s3cr3tP@ss
    AuthResponse:
      type: object
      required:
        - token
        - user
      properties:
        token:
          type: string
          description: JWT Bearer-токен
          example: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9...
        user:
          $ref: "#/components/schemas/UserDto"
    CommentDto:
      type: object
      required:
        - id
        - authorId
        - authorName
        - text
        - createdAt
      properties:
        id:
          type: string
          format: uuid
          example: aaaaaaaa-0000-0000-0000-000000000001
        authorId:
          type: string
          format: uuid
          example: 11111111-0000-0000-0000-000000000001
        authorName:
          type: string
          example: Иван Иванов
        text:
          type: string
          minLength: 1
          maxLength: 2000
          example: Отличный рецепт, всё получилось с первого раза!
        createdAt:
          type: string
          format: date-time
          example: "2024-06-01T12:00:00Z"
    CommentRequest:
      type: object
      required:
        - text
      properties:
        text:
          type: string
          minLength: 1
          maxLength: 2000
          example: Отличный рецепт, всё получилось с первого раза!
    PagedResultCommentDto:
      type: object
      required:
        - items
        - total
        - page
        - pageSize
      properties:
        items:
          type: array
          items:
            $ref: "#/components/schemas/CommentDto"
        total:
          type: integer
          description: Общее количество комментариев к рецепту
          example: 42
        page:
          type: integer
          description: Текущая страница
          example: 1
        pageSize:
          type: integer
          description: Размер страницы
          example: 10
    WeekDay:
      type: string
      enum:
        - monday
        - tuesday
        - wednesday
        - thursday
        - friday
        - saturday
        - sunday
      description: День недели
    MealType:
      type: string
      enum:
        - breakfast
        - lunch
        - dinner
      description: Приём пищи
    MealPlanItemDto:
      type: object
      required:
        - recipeId
        - recipeTitle
        - servings
      properties:
        recipeId:
          type: string
          format: uuid
          description: Идентификатор рецепта
          example: aad1f839-df31-49f2-84d7-4dd01e04be77
        recipeTitle:
          type: string
          description: Название рецепта
          example: Борщ
        servings:
          type: integer
          minimum: 1
          maximum: 99
          description: Количество порций
          example: 4
    MealPlanSlotDto:
      type: object
      required:
        - weekDay
        - mealType
        - items
      properties:
        weekDay:
          $ref: "#/components/schemas/WeekDay"
        mealType:
          $ref: "#/components/schemas/MealType"
        items:
          type: array
          items:
            $ref: "#/components/schemas/MealPlanItemDto"
          description: Блюда в слоте
    MealPlanDto:
      type: object
      required:
        - slots
      properties:
        slots:
          type: array
          items:
            $ref: "#/components/schemas/MealPlanSlotDto"
          description: Список слотов плана меню (до 21 слота — 7 дней × 3 приёма пищи)
    MealPlanItemRequest:
      type: object
      required:
        - recipeId
        - servings
      properties:
        recipeId:
          type: string
          format: uuid
          description: Идентификатор рецепта
          example: aad1f839-df31-49f2-84d7-4dd01e04be77
        servings:
          type: integer
          minimum: 1
          maximum: 99
          description: Количество порций
          example: 4
    MealPlanSlotRequest:
      type: object
      required:
        - weekDay
        - mealType
        - items
      properties:
        weekDay:
          $ref: "#/components/schemas/WeekDay"
        mealType:
          $ref: "#/components/schemas/MealType"
        items:
          type: array
          items:
            $ref: "#/components/schemas/MealPlanItemRequest"
          description: Блюда в слоте
    MealPlanRequest:
      type: object
      required:
        - slots
      properties:
        slots:
          type: array
          items:
            $ref: "#/components/schemas/MealPlanSlotRequest"
          description: Список слотов для замены плана меню
    ShoppingListItemDto:
      type: object
      required:
        - ingredientId
        - title
        - amount
        - unit
      properties:
        ingredientId:
          type: string
          format: uuid
          description: Идентификатор ингредиента
          example: 22222222-0000-0000-0000-000000000001
        title:
          type: string
          description: Название ингредиента
          example: Морковь
        amount:
          type: number
          format: double
          description: Суммарное количество
          example: 300
        unit:
          type: string
          description: Единица измерения
          example: г
    ShoppingListGroupDto:
      type: object
      required:
        - category
        - items
      properties:
        category:
          $ref: "#/components/schemas/IngredientCategory"
        items:
          type: array
          items:
            $ref: "#/components/schemas/ShoppingListItemDto"
          description: Ингредиенты в группе, отсортированные по названию
    DashboardStatsDto:
      type: object
      required:
        - totalRecipes
        - top10ByRating
        - topFavoritesByRating
        - byMainIngredient
        - byCuisine
      properties:
        totalRecipes:
          type: integer
          description: Общее количество публичных рецептов
        myRecipes:
          type: integer
          nullable: true
          description: Количество рецептов текущего пользователя (только для авторизованных)
        myComments:
          type: integer
          nullable: true
          description: Количество комментариев текущего пользователя (только для авторизованных)
        top10ByRating:
          type: array
          items:
            $ref: "#/components/schemas/RecipeRankDto"
          description: Топ-10 рецептов по среднему рейтингу
        topFavoritesByRating:
          type: array
          items:
            $ref: "#/components/schemas/RecipeRankDto"
          description: Топ избранных рецептов по рейтингу (только для авторизованных)
        byMainIngredient:
          type: array
          items:
            $ref: "#/components/schemas/CategoryCountDto"
          description: Распределение рецептов по основному ингредиенту
        byCuisine:
          type: array
          items:
            $ref: "#/components/schemas/CategoryCountDto"
          description: Распределение рецептов по кухне
        totalUsers:
          type: integer
          nullable: true
          description: Общее количество пользователей (только для admin)
        totalComments:
          type: integer
          nullable: true
          description: Общее количество комментариев (только для admin)
        topUsersByRating:
          type: array
          nullable: true
          items:
            $ref: "#/components/schemas/UserRankDto"
          description: Топ пользователей по среднему рейтингу рецептов (только для admin)
        topUsersByComments:
          type: array
          nullable: true
          items:
            $ref: "#/components/schemas/UserRankDto"
          description: Топ пользователей по количеству комментариев (только для admin)
        planFill:
          type: object
          nullable: true
          additionalProperties:
            type: boolean
          description: Заполненность слотов плана меню — ключ slot-key, значение true/false (только для авторизованных)
    RecipeRankDto:
      type: object
      required:
        - id
        - title
        - averageRating
      properties:
        id:
          type: string
          format: uuid
        title:
          type: string
        averageRating:
          type: number
          format: float
    CategoryCountDto:
      type: object
      required:
        - categoryName
        - recipeCount
      properties:
        categoryName:
          type: string
        recipeCount:
          type: integer
    UserRankDto:
      type: object
      required:
        - id
        - displayName
        - commentCount
      properties:
        id:
          type: string
          format: uuid
        displayName:
          type: string
        averageRating:
          type: number
          format: float
          nullable: true
          description: Средний рейтинг рецептов пользователя (null если рецептов нет)
        commentCount:
          type: integer
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
