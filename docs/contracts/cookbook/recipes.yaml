openapi: 3.0.0
info:
  title: Recipes API
  version: 1.0.0
  description: API сервиса рецептов (bounded context cookbook)
paths:
  /api/v1/recipes:
    get:
      summary: Получить список рецептов
      operationId: getRecipes
      tags:
        - Recipes
      responses:
        "200":
          description: Список рецептов
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/RecipeDto"
        "500":
          description: Внутренняя ошибка сервера
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ProblemDetails"
    post:
      summary: Создать рецепт
      operationId: createRecipe
      tags:
        - Recipes
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RecipeRequest"
      responses:
        "201":
          description: Рецепт создан
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RecipeDto"
        "400":
          description: Ошибка валидации
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ProblemDetails"
        "500":
          description: Внутренняя ошибка сервера
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ProblemDetails"
  /api/v1/recipes/{id}:
    get:
      summary: Получить рецепт по идентификатору
      operationId: getRecipeById
      tags:
        - Recipes
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Рецепт найден
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RecipeDto"
        "400":
          description: Некорректный идентификатор или рецепт не найден
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ProblemDetails"
        "500":
          description: Внутренняя ошибка сервера
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ProblemDetails"
    put:
      summary: Обновить рецепт
      operationId: updateRecipe
      tags:
        - Recipes
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RecipeRequest"
      responses:
        "204":
          description: Рецепт обновлён
        "400":
          description: Ошибка валидации, некорректный идентификатор или рецепт не найден
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ProblemDetails"
        "500":
          description: Внутренняя ошибка сервера
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ProblemDetails"
    delete:
      summary: Удалить рецепт
      operationId: deleteRecipe
      tags:
        - Recipes
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "204":
          description: Рецепт удалён
        "400":
          description: Некорректный идентификатор или рецепт не найден
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ProblemDetails"
        "500":
          description: Внутренняя ошибка сервера
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ProblemDetails"
components:
  schemas:
    Difficulty:
      type: string
      enum:
        - easy
        - everyday
        - festive
        - restaurant
        - signature
      example: everyday
    RecipeDto:
      type: object
      required:
        - id
        - title
        - description
        - cookingTime
        - difficulty
        - servings
        - instructions
      properties:
        id:
          type: string
          format: uuid
          example: aad1f839-df31-49f2-84d7-4dd01e04be77
        title:
          type: string
          example: Борщ
        description:
          type: string
          example: Классический украинский борщ со свёклой и капустой
        cookingTime:
          type: integer
          description: Время приготовления в минутах
          minimum: 1
          maximum: 9999
          example: 90
        difficulty:
          $ref: "#/components/schemas/Difficulty"
        servings:
          type: integer
          description: Количество порций
          minimum: 1
          maximum: 99
          example: 6
        instructions:
          type: string
          description: Пошаговые инструкции приготовления
          example: "Сварить бульон. Добавить овощи. Подавать со сметаной."
    RecipeRequest:
      type: object
      required:
        - title
        - cookingTime
        - difficulty
        - servings
        - instructions
      properties:
        title:
          type: string
          minLength: 1
          maxLength: 200
          example: Борщ
        description:
          type: string
          maxLength: 2000
          example: Классический украинский борщ со свёклой и капустой
        cookingTime:
          type: integer
          description: Время приготовления в минутах
          minimum: 1
          maximum: 9999
          example: 90
        difficulty:
          $ref: "#/components/schemas/Difficulty"
        servings:
          type: integer
          description: Количество порций
          minimum: 1
          maximum: 99
          example: 6
        instructions:
          type: string
          maxLength: 10000
          description: Пошаговые инструкции приготовления
          example: "Сварить бульон. Добавить овощи. Подавать со сметаной."
    ProblemDetails:
      description: RFC 7807 Problem Details
      type: object
      required:
        - type
        - title
        - status
        - detail
        - instance
      properties:
        type:
          type: string
          description: URI-ссылка, идентифицирующая тип проблемы
          example: about:blank
        title:
          type: string
          description: Краткое человекочитаемое описание типа проблемы
          example: Internal Server Error
        status:
          type: integer
          description: HTTP-статус код
          example: 500
        detail:
          type: string
          description: Детальное описание конкретного возникшего экземпляра проблемы
          example: An unexpected error occurred
        instance:
          type: string
          description: URI-ссылка, идентифицирующая конкретный экземпляр проблемы
          example: /api/v1/recipes
